/* ── ATOMS ── */
const Tag=({children,color,bg})=>(
  <span className="tag" style={{color,background:bg||color+"18",borderColor:color+"28"}}>{children}</span>
);
const Mono=({children,s={}})=><span className="mono" style={s}>{children}</span>;
const Label=({children})=><div className="label">{children}</div>;

/* ── MOTIVATIONAL MESSAGES ── */
const motivMsg=(pct,streak)=>{
  if(pct===100) return "Mükemmel. Bugün her şeyi yaptın. 🔥";
  if(pct>=80)   return "Neredeyse bitti. Son hamleyi yap.";
  if(pct>=50)   return "Yarısını geçtin. Devam et.";
  if(pct>0)     return "Başladın. Bu en önemli adım.";
  if(streak>7)  return `${streak} günlük serin var. Kırma.`;
  return "Bugün küçük bir adım bile yeterli.";
};

/* ── TIMER FLOAT ── */
function TimerFloat({timers,onPause,onResume,onStop}){
  if(!timers||timers.length===0)return null;
  return(
    <div style={{
      position:"fixed",
      bottom:`calc(58px + env(safe-area-inset-bottom,0px) + 10px)`,
      left:14,right:14,
      display:"flex",flexDirection:"column",gap:6,
      zIndex:90,
    }}>
      {timers.map(tm=>{
        const over=tm.elapsed>(tm.dur||0)*60&&tm.dur>0;
        const col=over?"var(--red)":"var(--orange)";
        return(
          <div key={tm.id} className="timer-float" style={{background:"var(--bg3)",border:`1px solid ${col}33`}}>
            <div style={{width:16,height:16,borderRadius:"50%",border:`2px solid var(--bg5)`,borderTop:`2px solid ${col}`,animation:tm.running?"spin 1s linear infinite":"none",flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <Mono s={{fontSize:15,fontWeight:600,color:col,display:"block",lineHeight:1.1}}>{fmtS(tm.elapsed)}</Mono>
              <div style={{fontSize:10,color:"var(--text3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:1}}>{tm.title}</div>
            </div>
            <button onClick={()=>tm.running?onPause(tm.id):onResume(tm.id)}
              style={{background:"var(--bg5)",border:"1px solid var(--border2)",borderRadius:10,width:32,height:32,color:"var(--text2)",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {tm.running?"⏸":"▶"}
            </button>
            <button onClick={()=>onStop(tm.id)}
              style={{background:col,border:"none",borderRadius:10,padding:"7px 12px",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>
              Bitir
            </button>
          </div>
        );
      })}
    </div>
  );
}

/* ── CI BANNER ── */
function CIBanner({ci,tasks,onCI}){
  const td=today();
  if(tasks.some(x=>x.date===td&&x.done)||ci[td])return null;
  return(
    <div className="ci-banner">
      <span style={{fontSize:22,flexShrink:0,animation:"breathe 2.5s infinite"}}>⚠️</span>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--orange)",marginBottom:3}}>Bugün henüz aktif değilsin</div>
        <div style={{fontSize:12,color:"var(--text3)",lineHeight:1.5}}>Streak ve disiplin skorun için check-in yap.</div>
      </div>
      <button onClick={onCI} style={{background:"var(--orange)",border:"none",borderRadius:12,padding:"10px 14px",color:"#000",fontSize:13,fontWeight:800,cursor:"pointer",flexShrink:0,fontFamily:"inherit"}}>Check-in</button>
    </div>
  );
}

/* ── TASK CARD ── */
function TaskCard({task,toggle,del,timers,startTimer,toggleSubtask}){
  const [t,sT]=useState(false);
  const pri=PRI[task.priority],cat=CAT[task.cat];
  const isA=timers?.some(tm=>tm.id===task.id);
  const activeTm=timers?.find(tm=>tm.id===task.id);
  const anyTimerRunning=timers?.length>=3;
  const timer=timers?.length>0?timers[0]:null;
  return(
    <div className={`task ${task.done?"done":""} ${isA?"timer-on":""}`}
      onTouchStart={()=>sT(true)} onTouchEnd={()=>sT(false)}
      style={{opacity:t?.97:1}}>
      <div style={{position:"absolute",left:0,top:"18%",bottom:"18%",width:3,background:isA?"var(--orange)":task.done?"var(--green)":pri.dot,borderRadius:"0 2px 2px 0"}}/>
      <div className={`task-check ${task.done?"done-c":""} ${isA&&!task.done?"timer-c":""}`}
        onClick={()=>!isA&&toggle(task.id)}>
        {task.done&&<span style={{fontSize:12,fontWeight:800,color:"#fff",animation:"checkPop .25s ease"}}>✓</span>}
        {isA&&!task.done&&<div style={{width:8,height:8,borderRadius:"50%",background:"var(--orange)",animation:"breathe 1s infinite"}}/>}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:14,fontWeight:500,color:task.done?"var(--text3)":"var(--text)",textDecoration:task.done?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",letterSpacing:"-.01em"}}>{task.title}</div>
        <div style={{display:"flex",gap:6,marginTop:6,alignItems:"center",flexWrap:"wrap"}}>
          <Tag color={pri.dot} bg={pri.bg}>{pri.label}</Tag>
          <Tag color={cat?.color||"var(--text3)"}>{cat?.label||task.cat}</Tag>
          {task.time&&task.time.includes(":")&&task.time.length<=5&&<span style={{fontSize:11,color:"var(--text3)"}}>🕐 {task.time}</span>}
          {task.dur>0&&<span style={{fontSize:11,color:"var(--text3)"}}>⏱ {fmtM(task.dur)}</span>}
          {task.noTimer&&!task.eff&&<span style={{fontSize:10,color:"var(--text4)"}}>süresiz</span>}
          {task.eff>0&&!isA&&<span style={{fontSize:11,fontWeight:600,color:"var(--green)"}}>✓ {fmtS(task.eff)}</span>}
          {isA&&<span style={{fontSize:11,color:"var(--orange)",fontWeight:600,animation:"breathe 1s infinite"}}>● çalışıyor</span>}
          {task.subtasks?.length>0&&<span style={{fontSize:10,color:"var(--text3)"}}>{task.subtasks.filter(s=>s.done).length}/{task.subtasks.length} adım</span>}
        </div>
        {/* Alt görevler — expand on tap */}
        {task.subtasks?.length>0&&!task.done&&(
          <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:4}}>
            {task.subtasks.map((s,i)=>(
              <div key={i} onClick={e=>{e.stopPropagation();toggleSubtask&&toggleSubtask(task.id,i)}}
                style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",padding:"3px 0"}}>
                <div style={{width:14,height:14,borderRadius:4,border:`1.5px solid ${s.done?"var(--green)":"var(--border2)"}`,background:s.done?"var(--green)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
                  {s.done&&<span style={{fontSize:8,fontWeight:800,color:"var(--bg)"}}>✓</span>}
                </div>
                <span style={{fontSize:12,color:s.done?"var(--text3)":"var(--text2)",textDecoration:s.done?"line-through":"none"}}>{s.text}</span>
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={{display:"flex",gap:6,flexShrink:0}}>
        {!task.done&&!isA&&!anyTimerRunning&&(
          <button onClick={()=>startTimer(task)} style={{background:"var(--orange-dim)",border:"1px solid rgba(255,159,10,.25)",borderRadius:11,padding:"7px 13px",color:"var(--orange)",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>▶</button>
        )}
        {!task.done&&!isA&&anyTimerRunning&&!timers.find(tm=>tm.id===task.id)&&(
          <button onClick={()=>startTimer(task)} style={{background:"transparent",border:"1px solid var(--border)",borderRadius:11,padding:"7px 13px",color:"var(--text3)",fontSize:12,cursor:"pointer",fontFamily:"inherit"}} title="Paralel başlat">▶</button>
        )}
        {!isA&&(
          <button onClick={()=>{if(activeTm)return;del(task.id)}} style={{background:"none",border:"none",padding:"7px 8px",color:"var(--text4)",fontSize:20,cursor:"pointer",lineHeight:1,borderRadius:8,fontFamily:"inherit"}}>×</button>
        )}
      </div>
    </div>
  );
}


/* ── TEMPLATE SHEET ── */

  const [tab,sTab]=useState("templates"); // templates | recurring
  const [showNewRecur,sNR]=useState(false);
  const [rTitle,sRT]=useState("");
  const [rDays,sRD]=useState("daily");
  const [rPri,sRP]=useState("med");
  const [rCat,sRC]=useState("is");
  const [rH,sRH]=useState(0);
  const [rM,sRM]=useState(30);
  const [rTime,sRTm]=useState("");
  const DAYS_BTN=["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"];

  const saveRecur=()=>{
    if(!rTitle.trim())return;
    const nr={
      id:"rec_"+Date.now(),
      title:rTitle.trim(),pri:rPri,cat:rCat,
      dur:rH*60+rM,time:rTime,
      days:rDays,noTimer:rH===0&&rM===0,
      subtasks:[],
    };
    setRecurring(prev=>[...prev,nr]);
    sNR(false);sRT("");sRD("daily");sRH(0);sRM(30);
  };

  return(
    <>
      <div className="overlay" onClick={onClose}/>
      <div className="sheet" style={{maxHeight:"88vh"}}>
        <div className="sheet-drag"/>
        <div style={{padding:"18px 20px 0"}}>

            {[["templates","📋 Şablonlar"],["recurring","🔁 Tekrarlayan"]].map(([id,lbl])=>(
              <button key={id} onClick={()=>sTab(id)}
                style={{flex:1,padding:"7px",background:tab===id?"var(--bg2)":"transparent",border:`1px solid ${tab===id?"var(--border2)":"transparent"}`,borderRadius:13,fontSize:12,fontWeight:tab===id?700:400,color:tab===id?"var(--text)":"var(--text3)",cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>
                {lbl}
              </button>
            ))}
          </div>

          {tab==="templates"&&(
            <div style={{display:"flex",flexDirection:"column",gap:8,paddingBottom:20}}>
              <div style={{fontSize:12,color:"var(--text3)",marginBottom:4}}>Bir şablon seç — tek tıkla bugüne eklenir.</div>
              {templates.map(tpl=>(
                <div key={tpl.id} onClick={()=>{onUseTemplate(tpl);onClose()}}
                  style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:16,padding:"14px 16px",cursor:"pointer",transition:"all .15s",WebkitTapHighlightColor:"transparent"}}
                  onTouchStart={e=>e.currentTarget.style.background="var(--bg4)"}
                  onTouchEnd={e=>e.currentTarget.style.background="var(--bg3)"}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{fontSize:15,fontWeight:600,color:"var(--text)"}}>{tpl.name}</div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      {tpl.dur>0&&<span style={{fontSize:11,color:"var(--text3)"}}>⏱ {tpl.dur}dk</span>}
                      {tpl.noTimer&&<span style={{fontSize:11,color:"var(--text3)"}}>süresiz</span>}
                      <span style={{fontSize:16,color:"var(--text4)"}}>›</span>
                    </div>
                  </div>
                  {tpl.subtasks?.length>0&&(
                    <div style={{marginTop:7,display:"flex",gap:5,flexWrap:"wrap"}}>
                      {tpl.subtasks.map((s,i)=>(
                        <span key={i} style={{fontSize:10,background:"var(--bg5)",borderRadius:8,padding:"2px 8px",color:"var(--text3)"}}>{s.text}</span>
                      ))}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}

          {tab==="recurring"&&(
            <div style={{display:"flex",flexDirection:"column",gap:8,paddingBottom:20}}>
              {!showNewRecur?(
                <>
                  <div style={{fontSize:12,color:"var(--text3)",marginBottom:4}}>Her gün veya seçili günlerde otomatik eklenir.</div>
                  {recurring.length===0&&(
                    <div style={{fontSize:13,color:"var(--text3)",textAlign:"center",padding:"24px 0",fontStyle:"italic"}}>Henüz tekrarlayan görev yok.</div>
                  )}
                  {recurring.map(r=>(
                    <div key={r.id} style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:16,padding:"14px 16px",display:"flex",alignItems:"center",gap:10}}>

                        <div style={{fontSize:14,fontWeight:600,color:"var(--text)"}}>{r.title}</div>
                        <div style={{fontSize:11,color:"var(--text3)",marginTop:3}}>
                          {r.days==="daily"?"Her gün":Array.isArray(r.days)?r.days.map(d=>DAYS_BTN[d]).join(", "):""}
                          {r.dur>0?` · ${r.dur}dk`:""}
                          {r.time?` · 🕐${r.time}`:""}
                        </div>
                      </div>
                      <button onClick={()=>setRecurring(prev=>prev.filter(x=>x.id!==r.id))}

                    <select className="inp" style={{padding:"11px 12px",fontSize:13}} value={rPri} onChange={e=>sRP(e.target.value)}>

                      <option value="med">🟡 Orta</option>
                      <option value="low">🔵 Düşük</option>
                    </select>
                    <select className="inp" style={{padding:"11px 12px",fontSize:13}} value={rCat} onChange={e=>sRC(e.target.value)}>
                      {Object.entries(CAT).map(([k,cv])=><option key={k} value={k}>{cv.label}</option>)}
                    </select>
                  </div>
                  {/* Günler */}
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",marginBottom:8,textTransform:"uppercase",letterSpacing:".08em"}}>Hangi günler</div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                      <button onClick={()=>sRD("daily")}
                        style={{padding:"7px 14px",borderRadius:20,background:rDays==="daily"?"var(--text)":"var(--bg4)",color:rDays==="daily"?"var(--bg)":"var(--text3)",border:"1px solid var(--border2)",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                        Her gün
                      </button>
                      {DAYS_BTN.map((d,i)=>{
                        const on=Array.isArray(rDays)&&rDays.includes(i);
                        return(
                          <button key={i} onClick={()=>{
                            const arr=Array.isArray(rDays)?rDays:[0,1,2,3,4,5,6];
                            const next=on?arr.filter(x=>x!==i):[...arr,i].sort();
                            sRD(next.length===0?"daily":next);
                          }}
                          style={{padding:"7px 12px",borderRadius:20,background:on?"var(--text)":"var(--bg4)",color:on?"var(--bg)":"var(--text3)",border:"1px solid var(--border2)",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                            {d}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:10}}>
                    <button className="btn btn-ghost" onClick={()=>sNR(false)} style={{flex:1}}>İptal</button>
                    <button className="btn btn-fill" onClick={saveRecur} style={{flex:2}}>Kaydet</button>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </>
  );
}

/* ── ADD TASK SHEET ── */

function ProfileSheet({profile,setProfile,onClose}){
  const [n,sN]=useState(profile.name);

  const handlePhoto=(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>setPhoto(ev.target.result);
    reader.readAsDataURL(file);
  };

  const save=()=>{
    if(n.trim()){
      setProfile({name:n.trim(),avatar:a,photo});
      onClose();
    }

  return(
    <>

              <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,.5)",padding:"5px 0",textAlign:"center"}}>
                <span style={{fontSize:11,color:"#fff",fontWeight:600}}>Değiştir</span>

/* ── DAY VIEW ── */
function DayView({tasks,filter,toggle,del,timers,startTimer,toggleSubtask,ci,onCI,stats,streak,archive,discScore,now}){
  const timer=timers?.length>0?timers[0]:null;
  // Haftalık özet — önceki hafta karşılaştırması
  const weekSummary=React.useMemo(()=>{
    const archArr=Object.entries(archive||{}).sort((a,b)=>b[0].localeCompare(a[0]));
    if(!archArr.length)return null;
    const prevScore=archArr[0][1].score;
    const diff=discScore-prevScore;
    return{prevScore,diff};
  },[archive,discScore]);
  const td=today();
  const filtered=useMemo(()=>{
    const base=tasks.filter(x=>x.date===td);
    let result=base;
    if(filter.type==="p"&&filter.value!=="all")result=base.filter(x=>x.priority===filter.value);
    else if(filter.type==="c")result=base.filter(x=>x.cat===filter.value);
    // Zaman bloğu olanlara göre sırala (saatli olanlar önce)
    return result.sort((a,b)=>{
      const aT=a.time&&a.time.length<=5?a.time:"99:99";
      const bT=b.time&&b.time.length<=5?b.time:"99:99";
      return aT.localeCompare(bT)||a.done-b.done;
    });
  },[tasks,filter]);

  // Saatli görevleri grupla
  const timedTasks=filtered.filter(x=>x.time&&x.time.length<=5&&!x.time.includes(" "));
  const hasTimeBlocks=timedTasks.length>0;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {weekSummary&&(
        <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:16,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{fontSize:12,color:"var(--text3)"}}>Geçen hafta</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:13,fontWeight:600,color:"var(--text2)"}}>Skor: {weekSummary.prevScore}</span>
            <span style={{fontSize:12,fontWeight:700,color:weekSummary.diff>=0?"var(--green)":"var(--red)"}}>
              {weekSummary.diff>=0?"↑":"↓"}{Math.abs(weekSummary.diff)}
            </span>
          </div>
        </div>
      )}
      <CIBanner ci={ci} tasks={tasks} onCI={onCI}/>
      {["high","med","low"].map(p=>{
        const list=filtered.filter(x=>x.priority===p).sort((a,b)=>a.done-b.done||a.id-b.id);
        const pri=PRI[p];
        return(
          <div key={p}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:9,marginTop:6}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:pri.dot,flexShrink:0}}/>
              <span style={{fontSize:11,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--text3)"}}>{pri.label}</span>
              <div style={{flex:1,height:1,background:"var(--border)"}}/>
              <Mono s={{fontSize:11,color:"var(--text3)"}}>{list.length}</Mono>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {list.length===0
                ?<div style={{padding:"18px",textAlign:"center",fontSize:13,color:"var(--text4)",fontStyle:"italic"}}>boş</div>
                :list.map(x=><TaskCard key={x.id} task={x} toggle={toggle} del={del} timers={timers} startTimer={startTimer} toggleSubtask={toggleSubtask}/>)
              }
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ── WEEK VIEW ── */
function WeekView({tasks,now,journal,ci,discScore}){
  const [selectedDay,setSelectedDay]=useState(null);
  const td=today(),mon=getMon(now);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return{d,dstr:ds(d),isT:ds(d)===td}});
  return(
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {selectedDay&&<DayDetailModal dstr={selectedDay} tasks={tasks} journal={journal||{}} ci={ci||{}} discScore={discScore||0} onClose={()=>setSelectedDay(null)}/>}
      {days.map(({d,dstr,isT})=>{
        const dt=tasks.filter(x=>x.date===dstr).sort((a,b)=>({high:0,med:1,low:2}[a.priority]-{high:0,med:1,low:2}[b.priority])||a.done-b.done);
        const eff=dt.filter(x=>x.done&&x.eff).reduce((s,x)=>s+Math.round(x.eff/60),0);
        const done=dt.filter(x=>x.done).length;
        const pct=dt.length?Math.round(done/dt.length*100):0;
        return(
          <div key={dstr} className="card" style={{padding:"15px 16px",borderColor:isT?"var(--blue)":"var(--border)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:dt.length?12:0}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                {isT&&<div style={{width:6,height:6,borderRadius:"50%",background:"var(--blue)",animation:"breathe 2s infinite"}}/>}
                <span style={{fontSize:14,fontWeight:700,color:isT?"var(--text)":"var(--text2)"}}>{DAYS_L[d.getDay()]} <Mono s={{fontSize:13}}>{d.getDate()}</Mono></span>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {eff>0&&<span style={{fontSize:11,color:"var(--green)"}}>⏱ {fmtM(eff)}</span>}
                {dt.length>0&&(
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div className="prog" style={{width:48}}>
                      <div className="prog-fill" style={{width:`${pct}%`,background:pct===100?"var(--green)":"var(--blue)"}}/>
                    </div>
                    <span style={{fontSize:11,color:"var(--text3)"}}>{done}/{dt.length}</span>
                  </div>
                )}
              </div>
            </div>
            {dt.length>0&&(
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {dt.map(x=>(
                  <div key={x.id} style={{fontSize:12,fontWeight:500,padding:"7px 11px",borderRadius:11,background:"var(--bg4)",borderLeft:`2.5px solid ${x.done?"var(--green)":PRI[x.priority]?.dot}`,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",opacity:x.done?.38:1,textDecoration:x.done?"line-through":"none",color:"var(--text)"}}>
                    {x.title}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function generateWeeklyReport({tasks,now,archive,discScore,streak}){
  const dow=(now.getDay()+6)%7;
  let wT=0,wD=0,wEff=0;
  const days=[];
  for(let i=dow;i>=0;i--){
    const d=new Date(now);d.setDate(now.getDate()-i);
    const dstr=ds(d),dt=tasks.filter(x=>x.date===dstr);
    const done=dt.filter(x=>x.done).length;
    const eff=dt.filter(x=>x.done&&x.eff).reduce((s,x)=>s+Math.round(x.eff/60),0);
    wT+=dt.length;wD+=done;wEff+=eff;
    days.push({label:DAYS_S[d.getDay()],total:dt.length,done,pct:dt.length?Math.round(done/dt.length*100):0});
  }
  const pct=wT===0?0:Math.round(wD/wT*100);
  // Önceki hafta karşılaştırması
  const archArr=Object.entries(archive).sort((a,b)=>b[0].localeCompare(a[0]));
  const prevScore=archArr.length>0?archArr[0][1].score:null;
  const diff=prevScore!=null?discScore-prevScore:null;
  return{wT,wD,pct,wEff,discScore,streak,days,diff,prevScore};
}

      {/* Day efficiency */}
      <div className="card" style={{padding:"20px 18px"}}>
        <Label>Güne Göre Verimlilik</Label>
        {byDay.map(({label,total,pct:p})=>(
          <div key={label} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <Mono s={{fontSize:11,color:"var(--text3)",width:28,flexShrink:0}}>{label}</Mono>
            <div className="prog" style={{flex:1,height:5}}>
              <div className="prog-fill" style={{width:`${maxDP?p/maxDP*100:0}%`,background:p>=80?"var(--green)":p>=50?"var(--blue)":"var(--orange)"}}/>
            </div>
            <Mono s={{fontSize:11,color:p>=80?"var(--green)":p>=50?"var(--blue)":"var(--orange)",width:32,textAlign:"right"}}>{total?`${p}%`:"—"}</Mono>
          </div>
        ))}
      </div>

      {/* Category */}
      {catBr.length>0&&(
        <div className="card" style={{padding:"20px 18px"}}>
          <Label>Bu Ay — Kategoriler</Label>
          {catBr.map(({k,c,total,done,pct:p})=>(
            <div key={k} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:13,fontWeight:600,color:c.color}}>{c.label}</span>
                <span style={{fontSize:12,color:"var(--text3)"}}>{done}/{total} · <strong style={{color:p>=80?"var(--green)":p>=50?"var(--blue)":"var(--orange)"}}>{p}%</strong></span>
              </div>
              <div className="prog" style={{height:4}}>
                <div className="prog-fill" style={{width:`${p}%`,background:c.color}}/>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Priority */}
      <div className="card" style={{padding:"20px 18px"}}>
        <Label>Öncelik Analizi</Label>
        {priB.map(({k,p,total,done,pct:pc})=>(
          <div key={k} style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <Tag color={p.dot} bg={p.bg}>{p.label}</Tag>
              <span style={{fontSize:12,color:"var(--text3)"}}>{done}/{total}</span>
            </div>
            <div className="prog" style={{height:4,marginBottom:4}}>
              <div className="prog-fill" style={{width:`${pc}%`,background:p.dot}}/>
            </div>
            <div style={{display:"flex",justifyContent:"flex-end"}}>
              <strong style={{fontSize:12,color:pc>=80?"var(--green)":pc>=50?"var(--blue)":"var(--orange)"}}>{total?`${pc}%`:"—"}</strong>
            </div>
          </div>
        ))}
        {priB.every(x=>x.total===0)&&<div style={{fontSize:13,color:"var(--text3)",fontStyle:"italic"}}>Henüz görev yok</div>}
      </div>

      {/* Top 4 cards */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {[
          {l:"Toplam Görev",v:allTotal,sub:`${allDone} tamamlandı`,c:"var(--text)"},
          {l:"Genel Başarı",v:`${gPct}%`,sub:"tüm zamanlar",c:"var(--green)"},
          {l:"Hafta Eforu",v:fmtM(effWeek),sub:"gerçek çalışma",c:"var(--orange)"},
          {l:"En Verimli",v:bH?{sabah:"Sabah ☀️",oglen:"Öğlen 🌤",aksam:"Akşam 🌙",gece:"Gece 🌚"}[bH[0]]:"—",sub:"saat dilimi",c:"var(--blue)"},
        ].map(({l,v,sub,c})=>(
          <div key={l} className="card" style={{padding:"16px"}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--text3)",marginBottom:8}}>{l}</div>
            <div className="hero-num" style={{fontSize:24,color:c}}>{v}</div>
            <div style={{fontSize:11,color:"var(--text3)",marginTop:6}}>{sub}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── JOURNAL VIEW ── */
function JournalView({now,journal,setJournal}){
  const td=today(),entry=journal[td]||{mood:0,text:"",morning:["","",""],evening:"",energy:0};
  const [mood,setMood]=useState(entry.mood||0);
  const [text,setText]=useState(entry.text||"");
  const [morning,setMorning]=useState(entry.morning||["","",""]);
  const [evening,setEvening]=useState(entry.evening||"");
  const [energy,setEnergy]=useState(entry.energy||0);
  const [saved,setSaved]=useState(false);
  const [tab,setTab]=useState("today"); // today | history
  useEffect(()=>{
    const e=journal[td]||{mood:0,text:"",morning:["","",""],evening:"",energy:0};
    setMood(e.mood||0);setText(e.text||"");
    setMorning(e.morning||["","",""]);setEvening(e.evening||"");setEnergy(e.energy||0);
  },[td]);
  const doSave=()=>{
    const u={...journal,[td]:{mood,text,morning,evening,energy}};
    setJournal(u);sv(SK.jrnl,u);setSaved(true);setTimeout(()=>setSaved(false),2000);
  };
  // Haftanın en iyi günü
  const bestDay=React.useMemo(()=>{
    const days=Array.from({length:7},(_,i)=>{
      const d=new Date(now);d.setDate(now.getDate()-i);
      const dstr=ds(d),e=journal[dstr];
      const score=(e?.mood||0)*20+(e?.energy||0)*10;
      return{dstr,label:DAYS_S[d.getDay()],score,mood:e?.mood||0,energy:e?.energy||0};
    }).filter(x=>x.score>0);
    if(!days.length)return null;
    return days.sort((a,b)=>b.score-a.score)[0];
  },[journal,now]);
  const entries=Object.entries(journal).filter(([,v])=>v.text||v.mood).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,30);
  const mental=Array.from({length:14},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(13-i));const dstr=ds(d);return{d,dstr,mood:journal[dstr]?.mood||0}});
  const moodCols=["#ff453a","#ff9f0a","var(--text3)","var(--green)","var(--green)"];
  const mSt=()=>{let s=0;const c=new Date();for(let i=0;i<60;i++){if(!journal[ds(c)]?.mood)break;s++;c.setDate(c.getDate()-1)}return s};
  const avgMood=(()=>{const f=mental.filter(x=>x.mood>0);return f.length?MOOD_E[Math.round(f.reduce((s,x)=>s+x.mood,0)/f.length)]:"—"})();
  const moodCols2=["#ff453a","#ff9f0a","var(--text3)","var(--green)","var(--green)"];
  const energyEmoji=["","😴","😑","😐","🙂","⚡"];
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>

      {/* Tab bar */}
      <div style={{display:"flex",gap:4,background:"var(--bg3)",border:"1px solid var(--border)",padding:4,borderRadius:18}}>
        {[["today","✏️ Bugün"],["history","📚 Geçmiş"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{flex:1,padding:"8px",background:tab===id?"var(--bg2)":"transparent",border:`1px solid ${tab===id?"var(--border2)":"transparent"}`,borderRadius:14,fontSize:12,fontWeight:tab===id?700:400,color:tab===id?"var(--text)":"var(--text3)",cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>
            {label}
          </button>
        ))}
      </div>

      {tab==="today"&&(
      <div className="card fade-up" style={{padding:"22px 18px"}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:22}}>
          <div>
            <div className="serif" style={{fontSize:26,fontWeight:700,color:"var(--text)",lineHeight:1}}>{DAYS_L[now.getDay()]}</div>
            <div style={{fontSize:13,color:"var(--text3)",marginTop:4}}>{now.getDate()} {MONS[now.getMonth()]} {now.getFullYear()}</div>
          </div>
          <span style={{fontSize:12,color:"var(--green)",opacity:saved?1:0,transition:"opacity .3s",fontWeight:600}}>✓ Kaydedildi</span>
        </div>
        {/* Mood */}
        <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",marginBottom:10,textTransform:"uppercase",letterSpacing:".08em"}}>Bugün nasılsın?</div>
        <div style={{display:"flex",gap:7,marginBottom:18}}>
          {[1,2,3,4,5].map(m=>(
            <button key={m} onClick={()=>setMood(m)}
              style={{flex:1,padding:"11px 4px",background:mood===m?`${moodCols2[m-1]}15`:"var(--bg4)",border:`1.5px solid ${mood===m?moodCols2[m-1]+"50":"var(--border)"}`,borderRadius:14,cursor:"pointer",transition:"all .15s",display:"flex",flexDirection:"column",alignItems:"center",gap:4,fontFamily:"inherit"}}>
              <span style={{fontSize:20,transform:mood===m?"scale(1.2)":"scale(1)",transition:"transform .15s"}}>{MOOD_E[m]}</span>
              <span style={{fontSize:8,fontWeight:600,color:mood===m?"var(--text)":"var(--text3)",textTransform:"uppercase",letterSpacing:".06em"}}>{MOOD_L[m]}</span>
            </button>
          ))}
        </div>

        {/* Enerji seviyesi */}
        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",marginBottom:10,textTransform:"uppercase",letterSpacing:".08em"}}>Enerji Seviyesi</div>
          <div style={{display:"flex",gap:6}}>
            {[1,2,3,4,5].map(e=>(
              <button key={e} onClick={()=>setEnergy(energy===e?0:e)}
                style={{flex:1,padding:"10px 4px",background:energy===e?"var(--bg2)":"var(--bg4)",border:`1.5px solid ${energy===e?"var(--border2)":"var(--border)"}`,borderRadius:12,cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:3,transition:"all .15s"}}>
                <span style={{fontSize:16}}>{energyEmoji[e]}</span>
                <Mono s={{fontSize:8,color:energy===e?"var(--text)":"var(--text3)"}}>{e}</Mono>
              </button>
            ))}
          </div>
        </div>

        {/* Sabah hedefleri — opsiyonel */}
        <div style={{marginBottom:18}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".08em"}}>☀️ Bugün ne yapmak istiyorum?</div>
            <span style={{fontSize:10,color:"var(--text3)"}}>isteğe bağlı</span>
          </div>
          {morning.map((g,i)=>(
            <input key={i} value={g} onChange={e=>{const m=[...morning];m[i]=e.target.value;setMorning(m)}}
              placeholder={`${i+1}. hedef...`}
              style={{display:"block",width:"100%",background:"var(--bg4)",border:"1.5px solid var(--border)",borderRadius:12,padding:"11px 14px",color:"var(--text)",fontSize:13,outline:"none",fontFamily:"inherit",marginBottom:6,transition:"border-color .15s",WebkitAppearance:"none"}}
              onFocus={e=>e.target.style.borderColor="var(--blue)"} onBlur={e=>e.target.style.borderColor="var(--border)"}/>
          ))}
        </div>

        {/* Serbest yazı */}
        <textarea value={text} onChange={e=>setText(e.target.value)}
          placeholder={"Bugün neler oldu? Ne hissettin?"}
          style={{background:"var(--bg4)",border:"1.5px solid var(--border)",borderRadius:14,padding:"14px 16px",color:"var(--text)",fontSize:14,lineHeight:1.8,resize:"vertical",minHeight:100,width:"100%",outline:"none",fontFamily:"inherit",WebkitAppearance:"none",transition:"border-color .15s",marginBottom:14}}
          onFocus={e=>e.target.style.borderColor="var(--blue)"} onBlur={e=>e.target.style.borderColor="var(--border)"}/>

        {/* Akşam rutini — opsiyonel */}
        <div style={{marginBottom:18}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".08em"}}>🌙 Bugünü nasıl kapattın?</div>
            <span style={{fontSize:10,color:"var(--text3)"}}>isteğe bağlı</span>
          </div>
          <input value={evening} onChange={e=>setEvening(e.target.value)}
            placeholder="1 cümleyle..."
            style={{width:"100%",background:"var(--bg4)",border:"1.5px solid var(--border)",borderRadius:12,padding:"11px 14px",color:"var(--text)",fontSize:13,outline:"none",fontFamily:"inherit",transition:"border-color .15s",WebkitAppearance:"none"}}
            onFocus={e=>e.target.style.borderColor="var(--blue)"} onBlur={e=>e.target.style.borderColor="var(--border)"}/>
        </div>

        <button onClick={doSave} className="btn btn-fill-blue" style={{borderRadius:14}}>Kaydet</button>
      </div>
      )} {/* tab===today END */}

      {tab==="today"&&bestDay&&(
        <div className="card" style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:22}}>🏆</span>
          <div>
            <div style={{fontSize:12,color:"var(--text3)",marginBottom:2}}>Bu haftanın en iyi günü</div>
            <div style={{fontSize:15,fontWeight:700,color:"var(--text)"}}>{bestDay.label} — {bestDay.mood?MOOD_E[bestDay.mood]:""} {bestDay.energy?energyEmoji[bestDay.energy]:""}</div>
          </div>
        </div>
      )}

      {tab==="history"&&(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {/* Mental chart */}
          <div className="card fade-up" style={{padding:"20px 18px"}}>
        <Label>Mental Seyir — Son 14 Gün</Label>
        <div style={{display:"flex",alignItems:"flex-end",gap:3,height:60,marginBottom:10}}>
          {mental.map(({d,dstr,mood:mval})=>{
            const h=mval?Math.max(8,mval/5*54):3;
            const c=mval===5?"var(--green)":mval===4?"rgba(48,209,88,.6)":mval===3?"var(--text3)":mval===2?"var(--orange)":mval===1?"var(--red)":"var(--bg5)";
            return(
              <div key={dstr} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,height:"100%",justifyContent:"flex-end"}}>
                <div style={{width:"100%",height:h,background:c,borderRadius:"3px 3px 0 0",transition:"height .5s"}}/>
                <Mono s={{fontSize:7,color:"var(--text3)",textTransform:"uppercase"}}>{DAYS_S[d.getDay()][0]}</Mono>
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,color:"var(--text3)"}}>😞 → 😄</span>
          <div style={{display:"flex",gap:16}}>
            <span style={{fontSize:12,color:"var(--text3)"}}>Seri: <strong style={{color:"var(--text)"}}>{mSt()} gün</strong></span>
            <span style={{fontSize:12,color:"var(--text3)"}}>Ort: <strong style={{color:"var(--text)"}}>{avgMood}</strong></span>

      {/* Past entries */}
      <div className="card fade-up-2" style={{padding:"20px 18px"}}>
        <Label>Geçmiş Günlükler</Label>
        {entries.length===0
          ?<div style={{fontSize:13,color:"var(--text3)",textAlign:"center",padding:"20px 0",fontStyle:"italic"}}>Henüz kayıt yok.</div>
          :entries.map(([date,e])=>{
            const d=new Date(date+"T12:00:00"),isT=date===td;
            const mCols2=["#ff453a","#ff9f0a","var(--text3)","var(--green)","var(--green)"];
            const eEmj=["","😴","😑","😐","🙂","⚡"];
            return(
              <div key={date} style={{borderBottom:"1px solid var(--border)",paddingBottom:14,marginBottom:14}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <span style={{fontSize:13,fontWeight:600,color:isT?"var(--text)":"var(--text2)"}}>{DAYS_S[d.getDay()]} {d.getDate()} {MONS[d.getMonth()]}</span>
                  {e.mood?<span style={{fontSize:15}}>{MOOD_E[e.mood]}</span>:null}
                  {e.energy?<span style={{fontSize:13}}>{eEmj[e.energy]}</span>:null}
                  {isT&&<Tag color="var(--blue)">bugün</Tag>}
                </div>
                {e.morning?.some(x=>x)&&(
                  <div style={{marginBottom:6}}>
                    {e.morning.filter(x=>x).map((g,i)=>(
                      <div key={i} style={{fontSize:11,color:"var(--text3)",padding:"2px 0"}}>☀️ {g}</div>
                    ))}
                  </div>
                )}
                {e.text&&<div style={{fontSize:13,color:"var(--text3)",lineHeight:1.7,marginBottom:e.evening?6:0}}>{e.text.slice(0,140)}{e.text.length>140?"…":""}</div>}
                {e.evening&&<div style={{fontSize:12,color:"var(--text3)",fontStyle:"italic"}}>🌙 {e.evening}</div>}
              </div>
            );
          })}
          </div>
        </div>
      )} {/* tab===history END */}
    </div>
  );
}

/* ── BOARD VIEW ── */
function BoardView({board,streak,weekPct,myEff}){
  const [tab,setTab]=useState("disc");
  const maxEff=Math.max(1,...board.map(u=>u.ef||0)),maxDisc=Math.max(1,...board.map(u=>u.disc||0));
  const sorted=[...board].sort((a,b)=>tab==="disc"?b.disc-a.disc:tab==="streak"?b.st-a.st||b.wp-a.wp:tab==="effort"?b.ef-a.ef||b.wp-a.wp:b.wp-a.wp||b.ef-a.ef);
  const myRank=sorted.findIndex(u=>u.me)+1,me=sorted.find(u=>u.me);
  const medals=["var(--gold)","var(--text3)","#c77b3a"];
  const motiv=()=>{
    if(myRank===1)return"👑 Zirvede! Kimse sana yaklaşamıyor.";
    const ab=sorted[myRank-2];
    if(tab==="disc")return`⚡ ${ab.n}'i geçmek için ${(ab.disc||0)-(me?.disc||0)} puan lazım.`;
    if(tab==="streak"){const d=ab.st-streak;return d<=0?`🔥 ${ab.n} ile aynı seride!`:`🔥 ${ab.n}'i geçmek için ${d} gün daha.`}
    if(tab==="effort")return`⏱ ${ab.n}'i geçmek için ${fmtM((ab.ef||0)-myEff)} daha.`;
    const d=ab.wp-weekPct;return d<=0?"📊 Aynı seviyedesin!":`📊 ${ab.n}'i geçmek için %${d} daha.`;
  };
  const TABS=[["disc","⚡ Disiplin"],["streak","🔥 Seri"],["effort","⏱ Efor"],["completion","📊 Bitirme"],["coach","👁 Koç"]];
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {/* My rank hero */}
      <div className="card fade-up" style={{padding:"24px 20px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 0% 50%, var(--blue-dim), transparent 65%)"}}/>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div className="hero-num" style={{fontSize:56,color:"var(--text)"}}>#{myRank}</div>
            <div style={{fontSize:13,color:"var(--text3)",marginTop:4}}>
              Disiplin <strong style={{color:"var(--blue)"}}>{me?.disc||0}</strong> · {fmtM(myEff)} efor · %{weekPct}
            </div>
          </div>
          {getBadge(streak)&&(
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:44,animation:"breathe 2s infinite"}}>{getBadge(streak).e}</div>
              <div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>{streak} gün</div>
            </div>
          )}
        </div>
      </div>

      {/* Formula */}
      <div style={{background:"var(--blue-dim)",border:"1px solid rgba(79,142,247,.2)",borderRadius:18,padding:"13px 16px",display:"flex",gap:10,alignItems:"center"}}>
        <span>⚡</span>
        <div style={{fontSize:11,color:"var(--text3)",lineHeight:1.6}}>
          <strong style={{color:"var(--blue)"}}>Disiplin = %30 Tamamlama + %30 Efor + %25 Check-in + %15 Seri.</strong> Her pazartesi sıfırlanır. Efor sadece timer'dan gelir.
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,background:"var(--bg3)",border:"1px solid var(--border)",padding:4,borderRadius:18}}>
        {TABS.map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)}
            style={{flex:1,padding:"9px 4px",background:tab===k?"var(--bg5)":"transparent",color:tab===k?"var(--text)":"var(--text3)",fontSize:11,fontWeight:tab===k?700:400,borderRadius:14,border:"none",cursor:"pointer",transition:"all .15s",whiteSpace:"nowrap",fontFamily:"inherit"}}>
            {l}
          </button>
        ))}
      </div>

      {/* List */}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {sorted.map((u,i)=>{
          const rank=i+1,isTop=rank<=3,isMe=u.me,badge=getBadge(u.st);
          let mv,ml,mc,bp;
          if(tab==="disc"){mv=u.disc||0;ml="disiplin";mc="var(--blue)";bp=Math.round((u.disc||0)/maxDisc*100)}
          else if(tab==="streak"){mv=`${u.st}g`;ml="seri";mc="var(--orange)";bp=Math.round(u.st/Math.max(1,sorted[0].st)*100)}
          else if(tab==="effort"){mv=fmtM(u.ef||0);ml="efor";mc="var(--green)";bp=Math.round((u.ef||0)/maxEff*100)}
          else{mv=`${u.wp}%`;ml="bitirme";mc="var(--text)";bp=u.wp}
          return(
            <div key={u.id} style={{background:isMe?"var(--blue-dim)":"var(--bg3)",border:`1px solid ${isMe?"rgba(79,142,247,.3)":isTop?medals[i]+"44":"var(--border)"}`,borderRadius:18,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,animation:"fadeUp .18s ease both"}}>
              <div style={{width:30,textAlign:"center",fontSize:isTop?20:13,fontWeight:700,color:isTop?medals[i]:"var(--text3)",flexShrink:0}}>{isTop?["🥇","🥈","🥉"][i]:`#${rank}`}</div>
              <div style={{fontSize:22,flexShrink:0}}>{u.av}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:600,color:isMe?"var(--blue)":"var(--text)",display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                  {u.n}{isMe&&<Tag color="var(--blue)">sen</Tag>}{badge&&<span style={{fontSize:12}}>{badge.e}</span>}
                </div>
                <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap"}}>

/* ── JOURNEY VIEW (UP SAYAÇ) ── */
function JourneyView({tasks,now,journal,discScore,stats}){
  const [liveNow,setLiveNow]=React.useState(new Date());
  const [showAnalysis,setShowAnalysis]=React.useState(false);
  React.useEffect(()=>{const id=setInterval(()=>setLiveNow(new Date()),1000);return()=>clearInterval(id)},[]);

  // İlk görevi eklendiği gün
  const firstTaskDate=React.useMemo(()=>{
    if(!tasks.length)return null;
    const sorted=[...tasks].sort((a,b)=>a.date.localeCompare(b.date));
    return new Date(sorted[0].date+"T12:00:00");
  },[tasks]);

  const totalSec=firstTaskDate?Math.floor((liveNow-firstTaskDate)/1000):0;
  const daysSince=Math.floor(totalSec/86400);
  const remH=Math.floor((totalSec%86400)/3600);
  const remMin=Math.floor((totalSec%3600)/60);
  const remSec=totalSec%60;

  // Haftalık ortalama karşılaştırması — ilk 2 hafta vs son 2 hafta
  const growthData=React.useMemo(()=>{
    if(!firstTaskDate||daysSince<14)return null;
    // İlk 14 gün
    const first14=[]; const last14=[];
    for(let i=0;i<14;i++){
      const d=new Date(firstTaskDate);d.setDate(firstTaskDate.getDate()+i);
      const dstr=ds(d),dt=tasks.filter(x=>x.date===dstr);
      first14.push(dt.length?Math.round(dt.filter(x=>x.done).length/dt.length*100):0);
    }
    for(let i=0;i<14;i++){
      const d=new Date(now);d.setDate(now.getDate()-(13-i));
      const dstr=ds(d),dt=tasks.filter(x=>x.date===dstr);
      last14.push(dt.length?Math.round(dt.filter(x=>x.done).length/dt.length*100):0);
    }
    const avgFirst=Math.round(first14.reduce((s,x)=>s+x,0)/14);
    const avgLast=Math.round(last14.reduce((s,x)=>s+x,0)/14);
    return{avgFirst,avgLast,diff:avgLast-avgFirst};
  },[tasks,firstTaskDate,daysSince,now]);

  // En uzun seri
  const longestStreak=React.useMemo(()=>{
    let max=0,cur=0;
    const sorted=[...new Set(tasks.filter(x=>x.done).map(x=>x.date))].sort();
    for(let i=0;i<sorted.length;i++){
      if(i===0){cur=1;}
      else{
        const prev=new Date(sorted[i-1]+"T12:00:00");
        const curr=new Date(sorted[i]+"T12:00:00");
        const diff=(curr-prev)/(1000*60*60*24);
        if(diff===1)cur++;else cur=1;
      }
      if(cur>max)max=cur;
    }
    return max;
  },[tasks]);

  // Aktif gün sayısı
  const activeDays=new Set(tasks.filter(x=>x.done).map(x=>x.date)).size;

  if(!tasks.length) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 20px",gap:16}}>
      <div style={{fontSize:48}}>🌱</div>
      <div className="serif" style={{fontSize:22,fontWeight:700,color:"var(--text)",textAlign:"center"}}>Yolculuğun henüz başlamadı</div>
      <div style={{fontSize:14,color:"var(--text3)",textAlign:"center",lineHeight:1.7}}>İlk görevi ekle, sayaç başlasın.</div>
    </div>
  );

  const dCol=discScore>=86?"#30d158":discScore>=71?"#4f8ef7":discScore>=51?"rgba(255,255,255,.85)":discScore>=31?"#ff9f0a":"#ff453a";

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>

      {/* Ana sayaç — basılı tut = analiz */}
      <div className="card fade-up" style={{padding:"36px 24px",textAlign:"center",position:"relative",overflow:"hidden",userSelect:"none",WebkitUserSelect:"none"}}
        onTouchStart={()=>setTimeout(()=>setShowAnalysis(true),600)}
        onTouchEnd={()=>{}}
        onMouseDown={()=>{const t=setTimeout(()=>setShowAnalysis(true),600);return()=>clearTimeout(t)}}
        onClick={()=>setShowAnalysis(a=>!a)}>
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 0%, rgba(255,255,255,.03), transparent 65%)"}}/>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:".14em",textTransform:"uppercase",color:"var(--text3)",marginBottom:12}}>UP. ile</div>

        {!showAnalysis?(
          <>
            <div className="hero-num" style={{fontSize:88,lineHeight:1,color:"var(--text)"}}>{daysSince}</div>
            <div style={{fontSize:17,fontWeight:600,color:"var(--text2)",marginTop:8}}>gün</div>
            {/* Canlı saat/dakika/saniye */}
            <div style={{display:"flex",justifyContent:"center",gap:16,marginTop:16}}>
              {[[remH,"saat"],[remMin,"dk"],[remSec,"sn"]].map(([val,lbl])=>(
                <div key={lbl} style={{textAlign:"center"}}>
                  <div className="mono" style={{fontSize:26,fontWeight:600,color:"var(--text2)",lineHeight:1}}>{String(val).padStart(2,"0")}</div>
                  <div style={{fontSize:9,color:"var(--text4)",textTransform:"uppercase",letterSpacing:".08em",marginTop:3}}>{lbl}</div>
                </div>
              ))}
            </div>
            {firstTaskDate&&(
              <div style={{fontSize:11,color:"var(--text4)",marginTop:14}}>{firstTaskDate.getDate()} {MONS[firstTaskDate.getMonth()]} {firstTaskDate.getFullYear()}'den beri</div>
            )}
            <div style={{fontSize:10,color:"var(--text4)",marginTop:8}}>analiz için dokun →</div>
          </>
        ):(
          <>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--text3)",marginBottom:14}}>ANALİZ</div>
            {growthData?(
              <div style={{display:"flex",alignItems:"center",gap:12,justifyContent:"center",marginBottom:12}}>
                <div style={{textAlign:"center"}}>
                  <div className="mono" style={{fontSize:28,fontWeight:700,color:"var(--text3)"}}>%{growthData.avgFirst}</div>
                  <div style={{fontSize:10,color:"var(--text4)"}}>İlk 2 hafta</div>
                </div>
                <div style={{fontSize:24,color:growthData.diff>=0?"var(--green)":"var(--red)",fontWeight:700}}>{growthData.diff>=0?"↑":"↓"}</div>
                <div style={{textAlign:"center"}}>
                  <div className="mono" style={{fontSize:28,fontWeight:700,color:growthData.diff>=0?"var(--green)":"var(--red)"}}>%{growthData.avgLast}</div>
                  <div style={{fontSize:10,color:"var(--text4)"}}>Son 2 hafta</div>
                </div>
              </div>
            ):(
              <div style={{fontSize:13,color:"var(--text3)",marginBottom:12}}>14 gün dolunca analiz burada çıkar.</div>
            )}
            <div style={{fontSize:13,fontWeight:600,color:growthData?.diff>=0?"var(--green)":"var(--text3)"}}>
              {growthData?.diff>=0?`Başlangıca göre %${growthData.diff} daha verimlisin 🎯`:`Başlangıca göre %${Math.abs(growthData?.diff||0)} düşüş var`}
            </div>
            <div style={{fontSize:10,color:"var(--text4)",marginTop:10}}>kapat →</div>
          </>
        )}
      </div>

      {/* Metrikler grid */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {[
          {icon:"✅",val:stats.doneAll,label:"Görev tamamlandı",c:"var(--text)"},
          {icon:"📅",val:activeDays,label:"Aktif gün",c:"var(--text)"},
          {icon:"🔥",val:`${longestStreak} gün`,label:"En uzun seri",c:"var(--orange)"},
          {icon:"⚡",val:discScore,label:"Disiplin skoru",c:dCol},
        ].map(({icon,val,label,c})=>(
          <div key={label} className="card" style={{padding:"18px 16px",textAlign:"center"}}>
            <div style={{fontSize:22,marginBottom:6}}>{icon}</div>
            <div className="serif" style={{fontSize:28,fontWeight:700,color:c,lineHeight:1}}>{val}</div>
            <div style={{fontSize:11,color:"var(--text3)",marginTop:5}}>{label}</div>
          </div>
        ))}
      </div>

      {/* Büyüme analizi */}
      {growthData&&(
        <div className="card fade-up-1" style={{padding:"22px 20px"}}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--text3)",marginBottom:18}}>BÜYÜME ANALİZİ</div>
          <div style={{display:"flex",alignItems:"center",gap:0}}>
            <div style={{flex:1,textAlign:"center",padding:"16px",background:"var(--bg3)",borderRadius:14,border:"1px solid var(--border)"}}>
              <div style={{fontSize:11,color:"var(--text3)",marginBottom:6}}>İlk 2 hafta</div>
              <div className="serif" style={{fontSize:32,fontWeight:700,color:"var(--text3)",lineHeight:1}}>%{growthData.avgFirst}</div>
            </div>
            <div style={{padding:"0 12px",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <div style={{fontSize:22,color:growthData.diff>=0?"var(--green)":"var(--red)"}}>{growthData.diff>=0?"→":"↓"}</div>
              <div style={{fontSize:11,fontWeight:700,color:growthData.diff>=0?"var(--green)":"var(--red)"}}>
                {growthData.diff>=0?"+":""}{growthData.diff}%
              </div>
            </div>
            <div style={{flex:1,textAlign:"center",padding:"16px",background:growthData.diff>=0?"rgba(48,209,88,.08)":"rgba(255,69,58,.08)",borderRadius:14,border:`1px solid ${growthData.diff>=0?"rgba(48,209,88,.2)":"rgba(255,69,58,.2)"}`}}>
              <div style={{fontSize:11,color:"var(--text3)",marginBottom:6}}>Son 2 hafta</div>
              <div className="serif" style={{fontSize:32,fontWeight:700,color:growthData.diff>=0?"var(--green)":"var(--red)",lineHeight:1}}>%{growthData.avgLast}</div>
            </div>
          </div>
          {growthData.diff>=0?(
            <div style={{marginTop:14,fontSize:13,color:"var(--text3)",textAlign:"center",lineHeight:1.7}}>
              🎯 İlk 2 haftana göre <strong style={{color:"var(--green)"}}>%{growthData.diff} daha verimlisin.</strong>
            </div>
          ):(
            <div style={{marginTop:14,fontSize:13,color:"var(--text3)",textAlign:"center",lineHeight:1.7}}>
              📉 Başlangıca göre <strong style={{color:"var(--red)"}}>%{Math.abs(growthData.diff)} düşüş</strong> var. Geri dönelim.
            </div>
          )}
        </div>
      )}

      {daysSince<14&&(
        <div className="card" style={{padding:"18px 20px",textAlign:"center"}}>
          <div style={{fontSize:13,color:"var(--text3)",lineHeight:1.7}}>
            Büyüme analizi için <strong style={{color:"var(--text)"}}>{14-daysSince} gün</strong> daha kullan.
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [splash,setSplash]=useState(true);
  const [isDark,setIsDark]=useState(()=>ld(SK.theme,"dark")!=="light");
  const [prevView,setPrevView]=useState("day");
  const [tasks,setTasks]=useState(()=>ld(SK.tasks,[]));
  const [journal,setJournal]=useState(()=>ld(SK.jrnl,{}));
  const [profile,setProfile]=useState(()=>ld(SK.prof,{name:"Sen",avatar:"🧑"}));
  const [board,setBoard]=useState(()=>ld(SK.brd,defBoard()));
  const [ci,setCi]=useState(()=>ld(SK.ci,{}));
  const [archive,setArchive]=useState(()=>ld(SK.arc,{}));
  const [view,setView]=useState("day");
  const changeView=React.useCallback((v)=>{setPrevView(view);setView(v)},[view]);
  const [filter,setFilter]=useState({type:"p",value:"all"});
  const [now,setNow]=useState(new Date());
  // Multi-timer: {id, title, dur, running, elapsed, startedAt}
  const [timers,setTimers]=useState([]);
  const tmrIntervalsRef=useRef({});
  const [templates,setTemplates]=useState(()=>ld(SK.tpls,DEFAULT_TEMPLATES));
  const [recurring,setRecurring]=useState(()=>ld(SK.recur,[]));
  const [showAdd,setShowAdd]=useState(false);
  const [showProf,setShowProf]=useState(false);
  const [showFilter,setShowFilter]=useState(false);
  const [showTpl,setShowTpl]=useState(false);
  const tmRef=useRef(null);

  /* Theme */
  useEffect(()=>{
    document.documentElement.setAttribute("data-theme",isDark?"dark":"light");
    sv(SK.theme,isDark?"dark":"light");
  },[isDark]);

  /* Persist */
  useEffect(()=>sv(SK.tasks,tasks),[tasks]);
  useEffect(()=>sv(SK.jrnl,journal),[journal]);
  useEffect(()=>sv(SK.prof,profile),[profile]);
  useEffect(()=>sv(SK.brd,board),[board]);
  useEffect(()=>sv(SK.ci,ci),[ci]);
  useEffect(()=>sv(SK.tpls,templates),[templates]);
  useEffect(()=>sv(SK.recur,recurring),[recurring]);

  /* Clock */
  useEffect(()=>{const id=setInterval(()=>setNow(new Date()),30000);return()=>clearInterval(id)},[]);

  /* Tekrarlayan görevler — her gün kontrol et */
  useEffect(()=>{
    if(!recurring.length)return;
    const td=today();
    const dayIdx=(new Date().getDay()+6)%7; // 0=Pzt...6=Paz
    recurring.forEach(r=>{
      // Bu gün aktif mi?
      const activeToday=r.days==="daily"||(Array.isArray(r.days)&&r.days.includes(dayIdx));
      if(!activeToday)return;
      // Bugün zaten eklendi mi?
      const alreadyAdded=tasks.some(t=>t.date===td&&t.recurId===r.id);
      if(alreadyAdded)return;
      // Ekle
      setTasks(p=>[...p,{
        id:Date.now()+Math.random(),
        title:r.title,priority:r.pri,cat:r.cat,
        dur:r.dur||0,noTimer:r.noTimer||false,
        done:false,date:td,
        time:r.time||"",eff:0,
        subtasks:(r.subtasks||[]).map(s=>({...s,done:false})),
        recurId:r.id,
        auto:true,
      }]);
    });
  },[today(),recurring.length]);

  /* Multi-timer intervals */
  useEffect(()=>{
    // Stop all intervals, restart only running ones
    Object.values(tmrIntervalsRef.current).forEach(clearInterval);
    tmrIntervalsRef.current={};
    timers.forEach(tm=>{
      if(tm.running){
        tmrIntervalsRef.current[tm.id]=setInterval(()=>{
          setTimers(prev=>prev.map(t=>t.id===tm.id?{...t,elapsed:t.elapsed+1}:t));
        },1000);
      }
    });
    return()=>Object.values(tmrIntervalsRef.current).forEach(clearInterval);
  },[timers.map(t=>t.id+t.running).join(',')]);

  /* Archive */
  useEffect(()=>{
    if(!tasks.length)return;
    const thisMonday=ds(getMon(now));
    if(archive[thisMonday])return;
    const lastNow=new Date(getMon(now));lastNow.setDate(lastNow.getDate()-1);
    const st=calcStreak({tasks,ci});
    const score=calcDisc({tasks,ci,streak:st,now:lastNow});
    const lastMon=(()=>{const m=new Date(getMon(now));m.setDate(m.getDate()-7);return ds(m)})();
    const u={...archive,[lastMon]:{score}};setArchive(u);sv(SK.arc,u);
  },[now.toDateString()]);

  /* Stats */
  const stats=useMemo(()=>{
    const td=today(),tdT=tasks.filter(x=>x.date===td),total=tdT.length,done=tdT.filter(x=>x.done).length;
    const pct=total===0?0:Math.round(done/total*100);
    const effToday=Math.round(tdT.filter(x=>x.done&&x.eff).reduce((s,x)=>s+x.eff/60,0));
    const dow=(now.getDay()+6)%7;let wT=0,wD=0,effWeek=0;
    for(let i=0;i<=dow;i++){const d=new Date(now);d.setDate(now.getDate()-i);const x=tasks.filter(t=>t.date===ds(d));wT+=x.length;wD+=x.filter(t=>t.done).length;effWeek+=Math.round(x.filter(t=>t.done&&t.eff).reduce((s,t)=>s+t.eff/60,0));}
    const weekPct=wT===0?0:Math.round(wD/wT*100);
    const y=now.getFullYear(),m=now.getMonth(),dim=new Date(y,m+1,0).getDate();
    let mT=0,mD=0;for(let d=1;d<=dim;d++){const dstr=`${y}-${p2(m+1)}-${p2(d)}`;const x=tasks.filter(t=>t.date===dstr);mT+=x.length;mD+=x.filter(t=>t.done).length;}
    const monthPct=mT===0?0:Math.round(mD/mT*100);
    const streak=calcStreak({tasks,ci});
    const counts={all:tdT.length};
    Object.keys(PRI).forEach(p=>counts[p]=tdT.filter(x=>x.priority===p).length);
    Object.keys(CAT).forEach(c=>counts[c]=tdT.filter(x=>x.cat===c).length);
    return{pct,doneT:done,totalT:total,doneAll:tasks.filter(x=>x.done).length,totalAll:tasks.length,weekPct,monthPct,streak,counts,effToday,effWeek};
  },[tasks,ci,now]);

  const discScore=useMemo(()=>calcDisc({tasks,ci,streak:stats.streak,now}),[tasks,ci,stats.streak,now]);
  const penaltyActive=useMemo(()=>calcPenalty({tasks,ci,now}),[tasks,ci,now]);

  /* Sync board */
  useEffect(()=>{
    setBoard(prev=>{const others=prev.filter(u=>!u.me);return[...others,{id:"me",n:profile.name,av:profile.avatar,st:stats.streak,wp:stats.weekPct,ef:stats.effWeek,disc:discScore,me:true}]});
  },[stats.streak,stats.weekPct,stats.effWeek,discScore,profile.name,profile.avatar]);

  /* Actions */
  const addTask=useCallback((title,pri,cat,dur,timeBlock,subtasks)=>{
    if(!title.trim())return;
    setTasks(p=>[...p,{
      id:Date.now()+Math.random(),
      title:title.trim(),
      priority:pri,cat,
      dur:dur||0,
      done:false,
      date:today(),
      time:timeBlock||new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"}),
      eff:0,
      subtasks:subtasks||[],
      noTimer:dur===-1,
    }]);
  },[]);

  const addFromTemplate=useCallback((tpl)=>{
    setTasks(p=>[...p,{
      id:Date.now()+Math.random(),
      title:tpl.name.replace(/[^\w\sÀ-ž]/g,'').trim()||tpl.name,
      priority:tpl.pri,cat:tpl.cat,
      dur:tpl.dur||0,
      done:false,
      date:today(),
      time:new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"}),
      eff:0,
      subtasks:(tpl.subtasks||[]).map(s=>({...s,done:false})),
      noTimer:tpl.noTimer||tpl.dur===-1,
      fromTemplate:tpl.id,
    }]);
  },[]);
  const toggleTask=useCallback(id=>{
    if(timers.find(t=>t.id===id))return;
    setTasks(p=>p.map(x=>x.id===id?{...x,done:!x.done}:x));
  },[timers]);
  const toggleSubtask=useCallback((taskId,subIdx)=>{
    setTasks(p=>p.map(x=>{
      if(x.id!==taskId)return x;
      const subs=(x.subtasks||[]).map((s,i)=>i===subIdx?{...s,done:!s.done}:s);
      const allDone=subs.length>0&&subs.every(s=>s.done);
      return{...x,subtasks:subs,done:allDone?true:x.done};
    }));
  },[]);
  const deleteTask=useCallback(id=>{if(timers.find(t=>t.id===id))return;setTasks(p=>p.filter(x=>x.id!==id))},[timers]);
  const doCI=useCallback(()=>{const td=today();setCi(prev=>{const u={...prev,[td]:true};sv(SK.ci,u);return u})},[]);
  const startTimer=useCallback(task=>{
    // Max 3 paralel timer
    if(timers.length>=3)return;
    // Already running?
    if(timers.find(t=>t.id===task.id))return;
    setTimers(prev=>[...prev,{id:task.id,title:task.title,dur:task.dur||0,running:true,elapsed:0}]);
  },[timers]);
  const pauseTimer=useCallback(taskId=>{
    setTimers(prev=>prev.map(t=>t.id===taskId?{...t,running:false}:t));
  },[]);
  const resumeTimer=useCallback(taskId=>{
    setTimers(prev=>prev.map(t=>t.id===taskId?{...t,running:true}:t));
  },[]);
  const stopTimer=useCallback(taskId=>{
    const tm=timers.find(t=>t.id===taskId);
    if(!tm)return;
    if(tm.elapsed>0){
      setTasks(p=>p.map(x=>x.id===taskId?{...x,done:true,eff:tm.elapsed}:x));
    }
    clearInterval(tmrIntervalsRef.current[taskId]);
    delete tmrIntervalsRef.current[taskId];
    setTimers(prev=>prev.filter(t=>t.id!==taskId));
  },[timers]);
  // Compat: single timer for old components
  const timer=timers.length>0?timers[0]:null;
  const elapsed=timer?.elapsed||0;

  const navH=58+20/* safe bottom estimate */;
  const timerH=timers.length>0?Math.min(timers.length,3)*60:0;
  const contentPb=navH+timerH+16;

  return(
    <div style={{background:"var(--bg)",color:"var(--text)",minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      {splash&&<SplashScreen onDone={()=>setSplash(false)}/>}
      {/* Sheets */}
      {showAdd    &&<AddSheet    onClose={()=>setShowAdd(false)}    add={addTask}/>}
      {showTpl    &&<TemplateSheet onClose={()=>setShowTpl(false)} templates={templates} onUseTemplate={addFromTemplate} recurring={recurring} setRecurring={setRecurring}/>}
      {showProf   &&<ProfileSheet profile={profile} setProfile={setProfile} onClose={()=>setShowProf(false)}/>}
      {showFilter &&<FilterSheet filter={filter} setFilter={setFilter} stats={stats} onClose={()=>setShowFilter(false)}/>}

      {/* Header */}
      <Header view={view} profile={profile} stats={stats} discScore={discScore}
        timer={timer} elapsed={elapsed} onPause={pauseTimer} onResume={resumeTimer} onStop={stopTimer}
        onProfile={()=>setShowProf(true)} onFilter={()=>setShowFilter(true)} onAdd={()=>setShowAdd(true)} onTpl={()=>setShowTpl(true)}
        isDark={isDark} toggleTheme={()=>setIsDark(d=>!d)}/>

      {/* Timer float */}
      {timers.length>0&&<TimerFloat timers={timers} onPause={pauseTimer} onResume={resumeTimer} onStop={stopTimer}/>}

      {/* Motivational strip — day view only */}
      {view==="day"&&stats.totalT>0&&(
        <div style={{margin:"0 18px 12px",padding:"11px 16px",background:"var(--accent-bg)",border:"1px solid var(--border)",borderRadius:16,fontSize:13,color:"var(--text2)",fontStyle:"italic"}}>
          {motivMsg(stats.pct,stats.streak)}
        </div>
      )}

      {/* Content */}
      <div key={view} className="scroll-content fade-up" style={{flex:1,padding:`0 18px ${contentPb}px`,overflow:"auto",WebkitOverflowScrolling:"touch"}}>
        {view==="day"    &&<div key="day" className="view-in" style={{minHeight:"100%"}}><DayView     tasks={tasks} filter={filter} toggle={toggleTask} del={deleteTask} timers={timers} startTimer={startTimer} toggleSubtask={toggleSubtask} ci={ci} onCI={doCI} stats={stats} streak={stats.streak} archive={archive} discScore={discScore} now={now}/>}
        {view==="week"   &&<WeekView    tasks={tasks} now={now} journal={journal} ci={ci} discScore={discScore}/>}
        {view==="month"  &&<MonthView   tasks={tasks} now={now} ci={ci} journal={journal} discScore={discScore}/>}
        {view==="disc"   &&<DiscView    tasks={tasks} ci={ci} now={now} archive={archive} streak={stats.streak} discScore={discScore} penaltyActive={penaltyActive}/>}
        {view==="stats"  &&<StatsView   tasks={tasks} now={now} discScore={discScore} stats={stats}/>}
        {view==="journal"&&<JournalView now={now} journal={journal} setJournal={setJournal}/>}
        {view==="journey" &&<JourneyView  tasks={tasks} now={now} journal={journal} discScore={discScore} stats={stats}/>}
        {view==="board"  &&<BoardView   board={board} streak={stats.streak} weekPct={stats.weekPct} myEff={stats.effWeek}/>}
      </div>

      {/* Bottom nav */}
      <nav className="nav">
        {VIEWS.map(v=>(
          <button key={v.id} className={`nav-btn ${view===v.id?"on":""}`} onClick={()=>changeView(v.id)}>
            <span className="nav-ic">{v.icon}</span>
            <span className="nav-lb">{v.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);








</script>
</body>
</html>
