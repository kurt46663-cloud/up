<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>UP.</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.10/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ══════════════════════════════════════════
   UP. v8 — PREMIUM DESIGN SYSTEM
   "Tokluk" = ağırlık, dolgunluk, güven
   ══════════════════════════════════════════ */

:root{
  /* Siyah — gerçek siyah, tv siyahı değil */
  --bg:    #000;
  --bg2:   #0c0c0c;
  --bg3:   #141414;
  --bg4:   #1c1c1e;
  --bg5:   #2c2c2e;

  /* Border — çok ince, neredeyse yok */
  --border:  rgba(255,255,255,.06);
  --border2: rgba(255,255,255,.11);

  /* Metin */
  --text:  #ffffff;
  --text2: rgba(255,255,255,.72);
  --text3: rgba(255,255,255,.38);
  --text4: rgba(255,255,255,.18);
  --text5: rgba(255,255,255,.08);

  --accent-bg: rgba(255,255,255,.055);

  /* iOS sistem renkleri — exact */
  --blue:        #0a84ff;
  --blue-dim:    rgba(10,132,255,.13);
  --green:       #30d158;
  --green-dim:   rgba(48,209,88,.11);
  --orange:      #ff9f0a;
  --orange-dim:  rgba(255,159,10,.11);
  --red:         #ff453a;
  --red-dim:     rgba(255,69,58,.11);
  --purple:      #bf5af2;
  --gold:        #ffd60a;

  /* Shadow — derin */
  --shadow:    0 24px 64px rgba(0,0,0,.75);
  --shadow-md: 0 10px 32px rgba(0,0,0,.5);
  --shadow-sm: 0 3px 12px rgba(0,0,0,.35);

  /* Spacing — cömert */
  --pad:    20px;   /* sayfa kenar boşluğu */
  --gap:    12px;   /* kartlar arası */
  --r:      22px;   /* büyük kart köşesi */
  --r-md:   16px;   /* orta */
  --r-sm:   12px;   /* küçük */
}

[data-theme="light"]{
  --bg:    #f2f2f7;
  --bg2:   #fff;
  --bg3:   #fff;
  --bg4:   #f2f2f7;
  --bg5:   #e5e5ea;
  --border:  rgba(0,0,0,.07);
  --border2: rgba(0,0,0,.13);
  --text:  #000;
  --text2: rgba(0,0,0,.68);
  --text3: rgba(0,0,0,.38);
  --text4: rgba(0,0,0,.18);
  --text5: rgba(0,0,0,.06);
  --accent-bg: rgba(0,0,0,.04);
  --blue:   #007aff;
  --blue-dim: rgba(0,122,255,.10);
  --green:  #34c759;
  --green-dim: rgba(52,199,89,.10);
  --orange: #ff9500;
  --orange-dim: rgba(255,149,0,.10);
  --red:    #ff3b30;
  --red-dim: rgba(255,59,48,.10);
  --purple: #af52de;
  --gold:   #ff9500;
  --shadow:    0 24px 64px rgba(0,0,0,.12);
  --shadow-md: 0 10px 32px rgba(0,0,0,.08);
  --shadow-sm: 0 3px 12px rgba(0,0,0,.05);
}

/* ── BASE ── */
html,body{
  background:var(--bg);
  color:var(--text);
  /* iOS sistem fontu — native his */
  font-family:-apple-system,BlinkMacSystemFont,
    'SF Pro Text','SF Pro Display',
    'Helvetica Neue',sans-serif;
  font-size:16px; /* 15→16: biraz daha tok */
  line-height:1.5;
  letter-spacing:-.018em;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
  height:100%;width:100%;
}

/* Sadece renk geçişleri animate et, layout değil */
*{
  transition:background-color .22s ease,
             border-color .22s ease,
             color .18s ease;
  scrollbar-width:none;
}
*::-webkit-scrollbar{display:none}

/* Animasyon sınıflarında transition kapatılıyor */
.fade-up,.fade-up-1,.fade-up-2,.fade-up-3,.scale-in,.view-in{
  transition:none !important;
}
.task{
  transition:border-color .22s ease,
             background-color .22s ease,
             opacity .22s ease !important;
}
.task:active{transition:transform .08s ease !important}

#root{height:100%;width:100%}

input,textarea,select,button{
  font-family:inherit;
  -webkit-appearance:none;appearance:none;
  letter-spacing:inherit;
}
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none}

/* ── TİPOGRAFİ ── */
/* Serif — New York varsa kullan, yoksa Georgia */
.serif{
  font-family:'New York',Georgia,'Times New Roman',serif;
  font-weight:500;
  letter-spacing:-.03em;
}
.mono{
  font-family:'SF Mono','Menlo','Courier New',monospace;
  letter-spacing:-.01em;
}
/* Büyük sayılar — kalın, çarpıcı */
.hero{
  font-family:'New York',Georgia,serif;
  font-weight:700;
  line-height:1;
  letter-spacing:-.05em;
}
.label{
  font-size:11px;font-weight:700;
  letter-spacing:.09em;text-transform:uppercase;
  color:var(--text3);
  margin-bottom:14px;
}

/* ── ANİMASYONLAR ── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px) scale(.99)}
  to  {opacity:1;transform:none}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{
  from{transform:translateY(100%)}
  to  {transform:translateY(0)}
}
@keyframes scaleIn{
  from{opacity:0;transform:scale(.94)}
  to  {opacity:1;transform:scale(1)}
}
@keyframes slideRight{
  from{opacity:0;transform:translateX(20px)}
  to  {opacity:1;transform:none}
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes breathe{
  0%,100%{opacity:.55;transform:scale(1)}
  50%    {opacity:1;transform:scale(1.06)}
}
@keyframes checkBounce{
  0%  {transform:scale(0);opacity:0}
  50% {transform:scale(1.35)}
  75% {transform:scale(.9)}
  100%{transform:scale(1);opacity:1}
}
@keyframes splashIn{
  0%  {opacity:0;transform:scale(.8) translateY(16px)}
  60% {opacity:1;transform:scale(1.04) translateY(0)}
  100%{opacity:1;transform:scale(1)}
}
@keyframes navPop{
  from{transform:translateX(-50%) scale(0);opacity:0}
  to  {transform:translateX(-50%) scale(1);opacity:1}
}
@keyframes lockShake{
  0%,100%{transform:translateX(0)}
  20%    {transform:translateX(-4px)}
  40%    {transform:translateX(4px)}
  60%    {transform:translateX(-3px)}
  80%    {transform:translateX(3px)}
}
@keyframes glowPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(10,132,255,.3)}
  50%    {box-shadow:0 0 0 10px rgba(10,132,255,.0)}
}

.fade-up  {animation:fadeUp .3s cubic-bezier(.25,.46,.45,.94) both}
.fade-up-1{animation:fadeUp .3s .07s cubic-bezier(.25,.46,.45,.94) both}
.fade-up-2{animation:fadeUp .3s .14s cubic-bezier(.25,.46,.45,.94) both}
.fade-up-3{animation:fadeUp .3s .21s cubic-bezier(.25,.46,.45,.94) both}
.scale-in {animation:scaleIn .25s cubic-bezier(.25,.46,.45,.94) both}
.view-in  {animation:slideRight .3s cubic-bezier(.25,.46,.45,.94) both}

/* ── OVERLAY & SHEET ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(10px) saturate(180%);
  -webkit-backdrop-filter:blur(10px) saturate(180%);
  z-index:200;
  animation:fadeIn .22s ease;
}
.sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg2);
  border:1px solid var(--border2);
  border-bottom:none;
  border-radius:28px 28px 0 0;
  z-index:201;
  animation:slideUp .36s cubic-bezier(.32,.72,0,1);
  padding-bottom:calc(32px + env(safe-area-inset-bottom,0px));
  max-height:93vh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  box-shadow:var(--shadow);
}
[data-theme="light"] .sheet{
  box-shadow:0 -1px 0 rgba(0,0,0,.08),var(--shadow);
}
.sheet-drag{
  width:36px;height:4px;
  background:var(--border2);
  border-radius:2px;
  margin:13px auto 0;
}

/* ── NAV BAR — gerçek veri gösterir ── */
.nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(40px) saturate(200%);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
  border-top:.5px solid rgba(255,255,255,.1);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom,0px);
  z-index:100;
}
[data-theme="light"] .nav{
  background:rgba(242,242,247,.9);
  border-top:.5px solid rgba(0,0,0,.12);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 2px 7px;
  background:none;border:none;cursor:pointer;
  color:var(--text3);
  position:relative;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  min-width:0;
}
.nav-btn.on{color:var(--blue)}
.nav-btn.on::before{
  content:'';
  position:absolute;top:0;left:50%;
  width:24px;height:2px;
  border-radius:0 0 2px 2px;
  background:var(--blue);
  transform:translateX(-50%);
  animation:navPop .22s cubic-bezier(.34,1.56,.64,1) both;
}
/* Üst değer — büyük, çarpıcı */
.nav-val{
  font-size:13px;font-weight:700;
  line-height:1;letter-spacing:-.02em;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),opacity .15s ease;
  opacity:.55;
}
.nav-btn.on .nav-val{opacity:1;transform:scale(1.08) translateY(-1px)}
.nav-btn:active .nav-val{transform:scale(.88);transition:transform .08s ease}
/* Alt etiket */
.nav-lb{
  font-size:8px;font-weight:600;
  letter-spacing:.04em;text-transform:uppercase;
  line-height:1;opacity:.7;
}

/* ── KART ── */
/* Temel kart — tok, dolgun */
.card{
  background:var(--bg3);
  border:.5px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
}
[data-theme="light"] .card{
  box-shadow:0 1px 4px rgba(0,0,0,.07);
}
.card-inner{
  background:var(--bg4);
  border:.5px solid var(--border);
  border-radius:var(--r-md);
}

/* ── BUTONLAR ── */
.btn{
  border:none;
  font-weight:700;cursor:pointer;
  letter-spacing:-.02em;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .12s,transform .1s;
}
.btn:active{opacity:.75;transform:scale(.97)}

/* Primer — beyaz zemin siyah metin */
.btn-fill{
  background:var(--text);color:var(--bg);
  padding:17px 28px;    /* daha tok */
  font-size:16px;
  border-radius:16px;
  width:100%;
}
/* Mavi CTA */
.btn-fill-blue{
  background:var(--blue);color:#fff;
  padding:17px 28px;font-size:16px;
  border-radius:16px;width:100%;
}
/* Ghost */
.btn-ghost{
  background:var(--accent-bg);color:var(--text2);
  border:.5px solid var(--border2);
  padding:16px 28px;font-size:16px;
  border-radius:16px;
}

/* ── INPUT ── */
.inp{
  background:var(--bg4);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px 18px;    /* daha tok */
  font-size:16px;
  color:var(--text);
  outline:none;width:100%;
}
.inp:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 4px rgba(10,132,255,.12);
}
.inp::placeholder{color:var(--text3)}

/* ── PROGRESS BAR ── */
.prog{
  height:3px;
  background:rgba(255,255,255,.06);
  border-radius:99px;overflow:hidden;
}
[data-theme="light"] .prog{background:rgba(0,0,0,.07)}
.prog-fill{
  height:100%;border-radius:99px;
  transition:width .9s cubic-bezier(.4,0,.2,1);
}

/* ── GÖREV KARTI — premium ── */
.task{
  background:var(--bg3);
  border:.5px solid var(--border);
  border-radius:18px;
  padding:16px 16px;    /* daha tok */
  display:flex;align-items:center;gap:14px;
  animation:fadeUp .28s cubic-bezier(.25,.46,.45,.94) both;
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  cursor:default;
  will-change:transform;
}
[data-theme="light"] .task{
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.task.done{opacity:.35}
.task.timer-on{
  border-color:rgba(255,159,10,.22);
  background:rgba(255,159,10,.025);
}
.task:active{transform:scale(.975);transition:transform .09s ease !important}

/* Checkbox — büyük, tok */
.task-check{
  width:27px;height:27px;border-radius:9px;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;
  background:transparent;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
}
.task-check:active{transform:scale(.82)}
.task-check.done-c{
  background:var(--green);border-color:var(--green);
}
.task-check.timer-c{border-color:var(--orange)}

/* ── TIMER BAR ── */
.timer-float{
  position:fixed;
  bottom:calc(62px + env(safe-area-inset-bottom,0px) + 8px);
  left:14px;right:14px;
  background:var(--bg3);
  border:.5px solid rgba(255,159,10,.22);
  border-radius:20px;
  padding:14px 16px;
  display:flex;align-items:center;gap:12px;
  z-index:90;
  animation:slideUp .3s cubic-bezier(.32,.72,0,1);
  box-shadow:var(--shadow-md);
}
[data-theme="light"] .timer-float{
  background:var(--bg2);
  box-shadow:0 4px 20px rgba(0,0,0,.1);
}

/* ── CI BANNER ── */
.ci-banner{
  background:rgba(255,159,10,.07);
  border:.5px solid rgba(255,159,10,.18);
  border-radius:18px;
  padding:16px 16px;   /* tok */
  display:flex;align-items:center;gap:12px;
  animation:fadeUp .3s ease;
}

/* ── TAG ── */
.tag{
  display:inline-flex;align-items:center;gap:3px;
  padding:3px 10px;border-radius:99px;
  font-size:11px;font-weight:600;letter-spacing:.01em;
  border:.5px solid transparent;
}

/* ── SCROLL — iOS fizik ── */
.scroll-content{
  overflow-y:scroll;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:auto; /* iOS rubber band aktif */
  scroll-behavior:smooth;
}

/* ── UZUN BASMA FOKUS — UP. premium dili ── */
.focus-mode-active .task:not(.task-focused){
  opacity:.28;
  transform:scale(.97);
  filter:blur(.4px);
}
.task-focused{
  border-color:var(--blue) !important;
  box-shadow:0 0 0 3px rgba(10,132,255,.15),
             0 8px 32px rgba(0,0,0,.4) !important;
  transform:scale(1.012) !important;
  z-index:10;
  position:relative;
}
.task-action-bar{
  display:flex;gap:8px;
  overflow:hidden;
  animation:fadeUp .2s cubic-bezier(.34,1.56,.64,1) both;
}

/* ── U WATERMARK — ince, ikonik ── */
.u-watermark{
  font-family:'New York',Georgia,serif;
  font-weight:700;
  color:var(--text);
  letter-spacing:-.06em;
  line-height:1;
  user-select:none;
  pointer-events:none;
}

/* ── TASK FOCUSED ACTIONS ── */
.task-actions{
  position:absolute;
  right:12px;top:50%;
  transform:translateY(-50%);
  display:flex;gap:6px;
  align-items:center;
  animation:fadeUp .18s cubic-bezier(.34,1.56,.64,1) both;
}

</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">








const {useState,useEffect,useMemo,useCallback,useRef}=React;

/* ── STORAGE ── */
const SK={tasks:"up2_t",jrnl:"up2_j",prof:"up2_p",brd:"up2_b",ci:"up2_ci",arc:"up2_arc",theme:"up2_th",wr:"up2_wr",jex:"up2_jex",first:"up2_first",timers:"up2_tmrs",tpls:"up2_tpls",recur:"up2_rec"};
const ld=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}};
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

/* ── CONSTANTS ── */
const PRI={
  high:{label:"Yüksek",color:"var(--red)",  bg:"var(--red-dim)",   dot:"#ff453a"},
  med: {label:"Orta",  color:"var(--orange)",bg:"var(--orange-dim)",dot:"#ff9f0a"},
  low: {label:"Düşük", color:"var(--blue)",  bg:"var(--blue-dim)",  dot:"#4f8ef7"},
};
const CAT={
  is:      {label:"İş",      color:"#a78bfa"},
  kisisel: {label:"Kişisel", color:"#f472b6"},
  saglik:  {label:"Sağlık",  color:"var(--green)"},
  egitim:  {label:"Eğitim",  color:"var(--gold)"},
  diger:   {label:"Diğer",   color:"var(--text3)"},
};
const DAYS_S=["Paz","Pzt","Sal","Çar","Per","Cum","Cmt"];
const DAYS_L=["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
const MONS=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const MOOD_E={1:"😞",2:"😔",3:"😐",4:"🙂",5:"😄"};
const MOOD_L={1:"Berbat",2:"Kötü",3:"Nötr",4:"İyi",5:"Harika"};
const AVATARS=["🧑","👨","👩","🧑‍💻","👨‍💻","👩‍💻","🧑‍🎓","👑","⚡","🔥","💎","🦁","🐺","🦊","🐉","🌟","🎯","🚀"];
const BADGES=[{m:100,e:"👑",l:"Efsane"},{m:60,e:"💎",l:"Kral"},{m:30,e:"🏆",l:"Aylık"},{m:14,e:"💪",l:"2 Hafta"},{m:7,e:"⚡",l:"Haftalık"},{m:1,e:"🔥",l:"Başladı"}];
const VIEWS=[
  {id:"day",    icon:"◎",label:"Bugün"},
  {id:"week",   icon:"▦",label:"Hafta"},
  {id:"month",  icon:"◫",label:"Ay"},
  {id:"disc",   icon:"◈",label:"Disiplin"},
  {id:"stats",  icon:"▲",label:"Analiz"},
  {id:"journal",icon:"◇",label:"Günlük"},
  {id:"board",  icon:"◉",label:"Sıralama"},
  {id:"journey",icon:"◐",label:"Yolculuk"},
];

/* ── ŞABLONLAR ── */
const DEFAULT_TEMPLATES=[
  {
    id:"tpl_antrenman",
    name:"Antrenman 💪",
    pri:"high",cat:"saglik",dur:90,noTimer:false,
    subtasks:[
      {text:"Isınma 10dk",done:false},
      {text:"Ana antrenman",done:false},
      {text:"Soğuma & germe",done:false},
    ]
  },
  {
    id:"tpl_yks",
    name:"YKS Çalışma 📚",
    pri:"high",cat:"egitim",dur:120,noTimer:false,
    subtasks:[
      {text:"1. konu bloğu",done:false},
      {text:"2. konu bloğu",done:false},
      {text:"Soru çöz",done:false},
    ]
  },
  {
    id:"tpl_is",
    name:"İş Görevi 💼",
    pri:"med",cat:"is",dur:60,noTimer:false,
    subtasks:[]
  },
  {
    id:"tpl_eylem",
    name:"Hızlı Eylem ⚡",
    pri:"low",cat:"kisisel",dur:-1,noTimer:true,
    subtasks:[]
  },
];

/* ── UTILS ── */
const p2=n=>String(n).padStart(2,"0");
const ds=(d=new Date())=>`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
const today=()=>ds();
const getMon=d=>{const m=new Date(d);m.setDate(d.getDate()-((d.getDay()+6)%7));return m};
const fmtS=s=>{if(!s)return"0:00";const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h?`${h}:${p2(m)}:${p2(sc)}`:`${m}:${p2(sc)}`};
const fmtM=m=>{if(!m)return"—";if(m<60)return`${m}dk`;const h=Math.floor(m/60),r=m%60;return r?`${h}s ${r}dk`:`${h}s`};
const getBadge=n=>BADGES.find(b=>n>=b.m)||null;
const calcStreak=({tasks,ci})=>{let s=0;const c=new Date();for(let i=0;i<365;i++){const d=ds(c);if(!tasks.some(t=>t.date===d&&t.done)&&!ci[d])break;s++;c.setDate(c.getDate()-1);}return s};
const calcPenalty=({tasks,ci,now})=>{
  // 3+ gün boş geçtiyse ceza puanı hesapla
  let emptyStreak=0;
  const c=new Date(now);
  for(let i=0;i<7;i++){
    const dstr=ds(c);
    const hasDone=tasks.some(t=>t.date===dstr&&t.done);
    const hasCI=ci[dstr];
    if(!hasDone&&!hasCI)emptyStreak++;
    else break;
    c.setDate(c.getDate()-1);
  }
  if(emptyStreak>=3)return Math.min(30,emptyStreak*5); // max -30 puan
  return 0;
};
const calcDisc=({tasks,ci,streak,now})=>{
  const dow=(now.getDay()+6)%7;let wT=0,wD=0,wE=0,wCI=0;
  for(let i=0;i<=dow;i++){const d=new Date(now);d.setDate(now.getDate()-i);const dstr=ds(d),dt=tasks.filter(t=>t.date===dstr);wT+=dt.length;wD+=dt.filter(t=>t.done).length;wE+=dt.filter(t=>t.done&&t.eff).reduce((s,t)=>s+Math.round(t.eff/60),0);if(ci[dstr]||dt.some(t=>t.done))wCI++;}
  const days=dow+1,cP=wT===0?0:Math.round(wD/wT*100),eN=Math.min(100,Math.round(wE/240*100)),cI=Math.round(wCI/days*100),sN=Math.min(100,Math.round(streak/30*100));
  const raw=Math.round(cP*.30+eN*.30+cI*.25+sN*.15);
  const penalty=calcPenalty({tasks,ci,now});
  return Math.max(0,raw-penalty);
};

/* ── TASK CARD ── */
function TaskCard({task,toggle,del,timers,startTimer,toggleSubtask,focusedId,setFocusedId}){
  const pri=PRI[task.priority],cat=CAT[task.cat];
  const isA=timers?.some(tm=>tm.id===task.id);
  const anyTimerRunning=timers?.length>=3;
  const isFocused=focusedId===task.id;
  const longRef=useRef(null);

  const handleTouchStart=useCallback(()=>{
    longRef.current=setTimeout(()=>{
      setFocusedId(id=>id===task.id?null:task.id);
      if(navigator.vibrate)navigator.vibrate(8);
    },420);
  },[task.id,setFocusedId]);

  const handleTouchEnd=useCallback(()=>{
    clearTimeout(longRef.current);
  },[]);

  return(
    <div
      className={`task ${task.done?"done":""} ${isA?"timer-on":""} ${isFocused?"task-focused":""}`}
      onTouchStart={handleTouchStart}
      onTouchEnd={handleTouchEnd}

      style={{paddingRight: isFocused?"100px":"16px"}}>
      <div style={{position:"absolute",left:0,top:"18%",bottom:"18%",width:3,background:isA?"var(--orange)":task.done?"var(--green)":pri.dot,borderRadius:"0 2px 2px 0"}}/>

        {task.done&&<span style={{fontSize:12,fontWeight:800,color:"var(--bg)",animation:"checkBounce .3s ease"}}>✓</span>}
        {isA&&!task.done&&<div style={{width:8,height:8,borderRadius:"50%",background:"var(--orange)",animation:"breathe 1s infinite"}}/>}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:15,fontWeight:500,color:task.done?"var(--text3)":"var(--text)",textDecoration:task.done?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",letterSpacing:"-.015em"}}>{task.title}</div>
        <div style={{display:"flex",gap:6,marginTop:6,alignItems:"center",flexWrap:"wrap"}}>
          <Tag color={pri.dot} bg={pri.bg}>{pri.label}</Tag>
          <Tag color={cat?.color||"var(--text3)"}>{cat?.label||task.cat}</Tag>
          {task.dur>0&&<span style={{fontSize:11,color:"var(--text3)"}}>⏱ {fmtM(task.dur)}</span>}
          {task.eff>0&&!isA&&<span style={{fontSize:11,fontWeight:600,color:"var(--green)"}}>✓ {fmtS(task.eff)}</span>}
          {isA&&<span style={{fontSize:11,color:"var(--orange)",fontWeight:600,animation:"breathe 1s infinite"}}>● çalışıyor</span>}
          {task.subtasks?.length>0&&<span style={{fontSize:10,color:"var(--text3)"}}>{task.subtasks.filter(s=>s.done).length}/{task.subtasks.length} adım</span>}
        </div>
        {task.subtasks?.length>0&&!task.done&&(
          <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:4}}>
            {task.subtasks.map((s,i)=>(
              <div key={i} onClick={e=>{e.stopPropagation();toggleSubtask&&toggleSubtask(task.id,i)}}
                style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",padding:"3px 0"}}>
                <div style={{width:14,height:14,borderRadius:4,border:`1.5px solid ${s.done?"var(--green)":"var(--border2)"}`,background:s.done?"var(--green)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
                  {s.done&&<span style={{fontSize:8,fontWeight:800,color:"var(--bg)"}}>✓</span>}
                </div>
                <span style={{fontSize:12,color:s.done?"var(--text3)":"var(--text2)",textDecoration:s.done?"line-through":"none"}}>{s.text}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Fokus modunda eylemler */}
      {isFocused&&(
        <div className="task-actions">
          {!task.done&&!isA&&(
            <button
              onClick={e=>{e.stopPropagation();startTimer(task);setFocusedId(null)}}

          )}
          <button
            onClick={e=>{e.stopPropagation();if(!isA){del(task.id);setFocusedId(null)}}}
            style={{background:"var(--red)",border:"none",borderRadius:12,width:36,height:36,color:"#fff",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:300,lineHeight:1}}>

        </div>
      )}

  );

function ProfileSheet({profile,setProfile,onClose}){
  const [n,sN]=useState(profile.name);
  const [a,sA]=useState(profile.avatar);
  const [photo,setPhoto]=useState(profile.photo||null);
  const fileRef=React.useRef();

  const handlePhoto=(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>setPhoto(ev.target.result);
    reader.readAsDataURL(file);
  };

  const save=()=>{
    if(n.trim()){
      setProfile({name:n.trim(),avatar:a,photo});
      onClose();
    }
  };

  return(
    <>
      <div className="overlay" onClick={onClose}/>
      <div className="sheet">

        <div style={{padding:"20px 20px 0"}}>

          <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:22}}>
            <div onClick={()=>fileRef.current?.click()}
              style={{width:88,height:88,borderRadius:"50%",background:"var(--bg4)",border:"2px solid var(--border2)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden",position:"relative",marginBottom:10}}>
              {photo
                ?<img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="profil"/>
                :<span style={{fontSize:36}}>{a}</span>
              }
              <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,.5)",padding:"5px 0",textAlign:"center"}}>
                <span style={{fontSize:11,color:"#fff",fontWeight:600}}>Değiştir</span>
              </div>
            </div>
            <input ref={fileRef} type="file" accept="image/*" onChange={handlePhoto} style={{display:"none"}}/>

                {av}
              </button>
            ))}
          </div>
          <div style={{display:"flex",gap:10,paddingBottom:8}}>
            <button className="btn btn-ghost" onClick={onClose} style={{flex:1}}>İptal</button>
            <button className="btn btn-fill" onClick={save} style={{flex:2}}>Kaydet</button>

/* ── DAY VIEW ── */
function DayView({tasks,filter,toggle,del,timers,startTimer,toggleSubtask,ci,onCI,stats,streak,archive,discScore,now}){
  const [focusedId,setFocusedId]=useState(null);
  const timer=timers?.length>0?timers[0]:null;
  const weekSummary=React.useMemo(()=>{
    const archArr=Object.entries(archive||{}).sort((a,b)=>b[0].localeCompare(a[0]));
    if(!archArr.length)return null;
    const prevScore=archArr[0][1].score;
    const diff=discScore-prevScore;
    return{prevScore,diff};
  },[archive,discScore]);
  const td=today();
  const filtered=useMemo(()=>{
    const base=tasks.filter(x=>x.date===td);
    let result=base;
    if(filter.type==="p"&&filter.value!=="all")result=base.filter(x=>x.priority===filter.value);
    else if(filter.type==="c")result=base.filter(x=>x.cat===filter.value);
    return result.sort((a,b)=>a.done-b.done||a.id-b.id);
  },[tasks,filter]);

  // Dışarı basınca fokus kapansın
  const handleContainerTap=useCallback((e)=>{
    if(focusedId&&!e.target.closest('.task'))setFocusedId(null);
  },[focusedId]);

  return(
    <div
      className={focusedId?"focus-mode-active":""}
      style={{display:"flex",flexDirection:"column",gap:8}}
      onTouchStart={handleContainerTap}>
      {weekSummary&&(
        <div style={{background:"var(--bg3)",border:".5px solid var(--border)",borderRadius:16,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{fontSize:12,color:"var(--text3)"}}>Geçen hafta</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:13,fontWeight:600,color:"var(--text2)"}}>Skor: {weekSummary.prevScore}</span>
            <span style={{fontSize:12,fontWeight:700,color:weekSummary.diff>=0?"var(--green)":"var(--red)"}}>
              {weekSummary.diff>=0?"↑":"↓"}{Math.abs(weekSummary.diff)}
            </span>
          </div>
        </div>
      )}
      <CIBanner ci={ci} tasks={tasks} onCI={onCI}/>
      {["high","med","low"].map(p=>{
        const list=filtered.filter(x=>x.priority===p).sort((a,b)=>a.done-b.done||a.id-b.id);
        const pri=PRI[p];
        return(
          <div key={p}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:9,marginTop:6}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:pri.dot,flexShrink:0}}/>
              <span style={{fontSize:11,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"var(--text3)"}}>{pri.label}</span>
              <div style={{flex:1,height:1,background:"var(--border)"}}/>
              <Mono s={{fontSize:11,color:"var(--text3)"}}>{list.length}</Mono>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {list.length===0
                ?<div style={{padding:"18px",textAlign:"center",fontSize:13,color:"var(--text4)",fontStyle:"italic"}}>boş</div>
                :list.map(x=><TaskCard key={x.id} task={x} toggle={toggle} del={del} timers={timers} startTimer={startTimer} toggleSubtask={toggleSubtask} focusedId={focusedId} setFocusedId={setFocusedId}/>)
              }
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ── WEEK VIEW ── */
function WeekView({tasks,now,journal,ci,discScore}){
  const [selectedDay,setSelectedDay]=useState(null);
  const td=today(),mon=getMon(now);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return{d,dstr:ds(d),isT:ds(d)===td}});
  return(
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {selectedDay&&<DayDetailModal dstr={selectedDay} tasks={tasks} journal={journal||{}} ci={ci||{}} discScore={discScore||0} onClose={()=>setSelectedDay(null)}/>}
      {days.map(({d,dstr,isT})=>{
        const dt=tasks.filter(x=>x.date===dstr).sort((a,b)=>({high:0,med:1,low:2}[a.priority]-{high:0,med:1,low:2}[b.priority])||a.done-b.done);
        const eff=dt.filter(x=>x.done&&x.eff).reduce((s,x)=>s+Math.round(x.eff/60),0);
        const done=dt.filter(x=>x.done).length;
        const pct=dt.length?Math.round(done/dt.length*100):0;
        return(
          <div key={dstr} className="card" style={{padding:"15px 16px",borderColor:isT?"var(--blue)":"var(--border)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:dt.length?12:0}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                {isT&&<div style={{width:6,height:6,borderRadius:"50%",background:"var(--blue)",animation:"breathe 2s infinite"}}/>}
                <span style={{fontSize:14,fontWeight:700,color:isT?"var(--text)":"var(--text2)"}}>{DAYS_L[d.getDay()]} <Mono s={{fontSize:13}}>{d.getDate()}</Mono></span>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {eff>0&&<span style={{fontSize:11,color:"var(--green)"}}>⏱ {fmtM(eff)}</span>}
                {dt.length>0&&(
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div className="prog" style={{width:48}}>
                      <div className="prog-fill" style={{width:`${pct}%`,background:pct===100?"var(--green)":"var(--blue)"}}/>
                    </div>
                    <span style={{fontSize:11,color:"var(--text3)"}}>{done}/{dt.length}</span>
                  </div>
                )}
              </div>
            </div>
            {dt.length>0&&(
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {dt.map(x=>(
                  <div key={x.id} style={{fontSize:12,fontWeight:500,padding:"7px 11px",borderRadius:11,background:"var(--bg4)",borderLeft:`2.5px solid ${x.done?"var(--green)":PRI[x.priority]?.dot}`,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",opacity:x.done?.38:1,textDecoration:x.done?"line-through":"none",color:"var(--text)"}}>
                    {x.title}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

  const jEntry=journal[dstr]||{};
  const hasCI=ci[dstr];
  const dCol=pct>=80?"var(--green)":pct>=50?"var(--text)":pct>0?"var(--orange)":"var(--text3)";

            {[
              {icon:"✅",val:`${done}/${dt.length}`,label:"Görev",c:dCol},
              {icon:"⏱",val:fmtM(eff)||"—",label:"Efor",c:"var(--text)"},

              <div className="prog" style={{height:5}}>
                <div className="prog-fill" style={{width:`${pct}%`,background:dCol}}/>

          {/* Görev listesi */}
          {dt.length>0&&(
            <div style={{marginBottom:18}}>

    <div>

        {Array.from({length:sD},(_,i)=><div key={"b"+i}/>)}
        {Array.from({length:dim},(_,i)=>{
          const d=i+1,dstr=`${y}-${p2(m+1)}-${p2(d)}`,isT=dstr===td;

function generateWeeklyReport({tasks,now,archive,discScore,streak}){
  const dow=(now.getDay()+6)%7;
  let wT=0,wD=0,wEff=0;
  const days=[];
  for(let i=dow;i>=0;i--){
    const d=new Date(now);d.setDate(now.getDate()-i);
    const dstr=ds(d),dt=tasks.filter(x=>x.date===dstr);
    const done=dt.filter(x=>x.done).length;
    const eff=dt.filter(x=>x.done&&x.eff).reduce((s,x)=>s+Math.round(x.eff/60),0);
    wT+=dt.length;wD+=done;wEff+=eff;
    days.push({label:DAYS_S[d.getDay()],total:dt.length,done,pct:dt.length?Math.round(done/dt.length*100):0});
  }
  const pct=wT===0?0:Math.round(wD/wT*100);
  // Önceki hafta karşılaştırması
  const archArr=Object.entries(archive).sort((a,b)=>b[0].localeCompare(a[0]));
  const prevScore=archArr.length>0?archArr[0][1].score:null;
  const diff=prevScore!=null?discScore-prevScore:null;
  return{wT,wD,pct,wEff,discScore,streak,days,diff,prevScore};
}

        {[
          {l:"Toplam Görev",v:allTotal,sub:`${allDone} tamamlandı`,c:"var(--text)"},

          {l:"Hafta Eforu",v:fmtM(effWeek),sub:"gerçek çalışma",c:"var(--orange)"},
          {l:"En Verimli",v:bH?{sabah:"Sabah ☀️",oglen:"Öğlen 🌤",aksam:"Akşam 🌙",gece:"Gece 🌚"}[bH[0]]:"—",sub:"saat dilimi",c:"var(--blue)"},
        ].map(({l,v,sub,c})=>(

        ))}
      </div>
    </div>
  );
}

/* ── JOURNAL VIEW ── */

  const [mood,setMood]=useState(entry.mood||0);
  const [text,setText]=useState(entry.text||"");
  const [morning,setMorning]=useState(entry.morning||["","",""]);
  const [evening,setEvening]=useState(entry.evening||"");
  const [energy,setEnergy]=useState(entry.energy||0);
  const [saved,setSaved]=useState(false);
  const [tab,setTab]=useState("today"); // today | history
  useEffect(()=>{
    const e=journal[td]||{mood:0,text:"",morning:["","",""],evening:"",energy:0};
    setMood(e.mood||0);setText(e.text||"");
    setMorning(e.morning||["","",""]);setEvening(e.evening||"");setEnergy(e.energy||0);
  },[td]);
  const doSave=()=>{
    const u={...journal,[td]:{mood,text,morning,evening,energy}};
    setJournal(u);sv(SK.jrnl,u);setSaved(true);setTimeout(()=>setSaved(false),2000);
  };
  // Haftanın en iyi günü
  const bestDay=React.useMemo(()=>{
    const days=Array.from({length:7},(_,i)=>{
      const d=new Date(now);d.setDate(now.getDate()-i);
      const dstr=ds(d),e=journal[dstr];
      const score=(e?.mood||0)*20+(e?.energy||0)*10;
      return{dstr,label:DAYS_S[d.getDay()],score,mood:e?.mood||0,energy:e?.energy||0};
    }).filter(x=>x.score>0);
    if(!days.length)return null;
    return days.sort((a,b)=>b.score-a.score)[0];
  },[journal,now]);
  const entries=Object.entries(journal).filter(([,v])=>v.text||v.mood).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,30);
  const mental=Array.from({length:14},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(13-i));const dstr=ds(d);return{d,dstr,mood:journal[dstr]?.mood||0}});
  const moodCols=["#ff453a","#ff9f0a","var(--text3)","var(--green)","var(--green)"];
  const mSt=()=>{let s=0;const c=new Date();for(let i=0;i<60;i++){if(!journal[ds(c)]?.mood)break;s++;c.setDate(c.getDate()-1)}return s};
  const avgMood=(()=>{const f=mental.filter(x=>x.mood>0);return f.length?MOOD_E[Math.round(f.reduce((s,x)=>s+x.mood,0)/f.length)]:"—"})();
  const moodCols2=["#ff453a","#ff9f0a","var(--text3)","var(--green)","var(--green)"];
  const energyEmoji=["","😴","😑","😐","🙂","⚡"];
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>

      {/* Tab bar */}
      <div style={{display:"flex",gap:4,background:"var(--bg3)",border:"1px solid var(--border)",padding:4,borderRadius:18}}>
        {[["today","✏️ Bugün"],["history","📚 Geçmiş"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{flex:1,padding:"8px",background:tab===id?"var(--bg2)":"transparent",border:`1px solid ${tab===id?"var(--border2)":"transparent"}`,borderRadius:14,fontSize:12,fontWeight:tab===id?700:400,color:tab===id?"var(--text)":"var(--text3)",cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>
            {label}
          </button>
        ))}
      </div>

      {tab==="today"&&(
      <div className="card fade-up" style={{padding:"22px 18px"}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:22}}>
          <div>
            <div className="serif" style={{fontSize:26,fontWeight:700,color:"var(--text)",lineHeight:1}}>{DAYS_L[now.getDay()]}</div>
            <div style={{fontSize:13,color:"var(--text3)",marginTop:4}}>{now.getDate()} {MONS[now.getMonth()]} {now.getFullYear()}</div>
          </div>
          <span style={{fontSize:12,color:"var(--green)",opacity:saved?1:0,transition:"opacity .3s",fontWeight:600}}>✓ Kaydedildi</span>

        <div style={{display:"flex",gap:7,marginBottom:18}}>

            <button key={m} onClick={()=>setMood(m)}

              <span style={{fontSize:20,transform:mood===m?"scale(1.2)":"scale(1)",transition:"transform .15s"}}>{MOOD_E[m]}</span>
              <span style={{fontSize:8,fontWeight:600,color:mood===m?"var(--text)":"var(--text3)",textTransform:"uppercase",letterSpacing:".06em"}}>{MOOD_L[m]}</span>
            </button>

        </div>

        {/* Enerji seviyesi */}
        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",marginBottom:10,textTransform:"uppercase",letterSpacing:".08em"}}>Enerji Seviyesi</div>
          <div style={{display:"flex",gap:6}}>
            {[1,2,3,4,5].map(e=>(

              </button>

          </div>
        </div>

        {/* Sabah hedefleri — opsiyonel */}
        <div style={{marginBottom:18}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".08em"}}>☀️ Bugün ne yapmak istiyorum?</div>
            <span style={{fontSize:10,color:"var(--text3)"}}>isteğe bağlı</span>
          </div>
          {morning.map((g,i)=>(
            <input key={i} value={g} onChange={e=>{const m=[...morning];m[i]=e.target.value;setMorning(m)}}
              placeholder={`${i+1}. hedef...`}
              style={{display:"block",width:"100%",background:"var(--bg4)",border:"1.5px solid var(--border)",borderRadius:12,padding:"11px 14px",color:"var(--text)",fontSize:13,outline:"none",fontFamily:"inherit",marginBottom:6,transition:"border-color .15s",WebkitAppearance:"none"}}
              onFocus={e=>e.target.style.borderColor="var(--blue)"} onBlur={e=>e.target.style.borderColor="var(--border)"}/>
          ))}
        </div>

        {/* Serbest yazı */}
        <textarea value={text} onChange={e=>setText(e.target.value)}
          placeholder={"Bugün neler oldu? Ne hissettin?"}
          style={{background:"var(--bg4)",border:"1.5px solid var(--border)",borderRadius:14,padding:"14px 16px",color:"var(--text)",fontSize:14,lineHeight:1.8,resize:"vertical",minHeight:100,width:"100%",outline:"none",fontFamily:"inherit",WebkitAppearance:"none",transition:"border-color .15s",marginBottom:14}}
          onFocus={e=>e.target.style.borderColor="var(--blue)"} onBlur={e=>e.target.style.borderColor="var(--border)"}/>

        {/* Akşam rutini — opsiyonel */}
        <div style={{marginBottom:18}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".08em"}}>🌙 Bugünü nasıl kapattın?</div>
            <span style={{fontSize:10,color:"var(--text3)"}}>isteğe bağlı</span>
          </div>
          <input value={evening} onChange={e=>setEvening(e.target.value)}
            placeholder="1 cümleyle..."
            style={{width:"100%",background:"var(--bg4)",border:"1.5px solid var(--border)",borderRadius:12,padding:"11px 14px",color:"var(--text)",fontSize:13,outline:"none",fontFamily:"inherit",transition:"border-color .15s",WebkitAppearance:"none"}}
            onFocus={e=>e.target.style.borderColor="var(--blue)"} onBlur={e=>e.target.style.borderColor="var(--border)"}/>
        </div>

        <button onClick={doSave} className="btn btn-fill-blue" style={{borderRadius:14}}>Kaydet</button>
      </div>
      )} {/* tab===today END */}

      {tab==="today"&&bestDay&&(
        <div className="card" style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:22}}>🏆</span>
          <div>
            <div style={{fontSize:12,color:"var(--text3)",marginBottom:2}}>Bu haftanın en iyi günü</div>
            <div style={{fontSize:15,fontWeight:700,color:"var(--text)"}}>{bestDay.label} — {bestDay.mood?MOOD_E[bestDay.mood]:""} {bestDay.energy?energyEmoji[bestDay.energy]:""}</div>
          </div>
        </div>
      )}

      {tab==="history"&&(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {/* Mental chart */}
          <div className="card fade-up" style={{padding:"20px 18px"}}>
        <Label>Mental Seyir — Son 14 Gün</Label>
        <div style={{display:"flex",alignItems:"flex-end",gap:3,height:60,marginBottom:10}}>
          {mental.map(({d,dstr,mood:mval})=>{
            const h=mval?Math.max(8,mval/5*54):3;
            const c=mval===5?"var(--green)":mval===4?"rgba(48,209,88,.6)":mval===3?"var(--text3)":mval===2?"var(--orange)":mval===1?"var(--red)":"var(--bg5)";

                <Mono s={{fontSize:7,color:"var(--text3)",textTransform:"uppercase"}}>{DAYS_S[d.getDay()][0]}</Mono>
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>

            const eEmj=["","😴","😑","😐","🙂","⚡"];
            return(
              <div key={date} style={{borderBottom:"1px solid var(--border)",paddingBottom:14,marginBottom:14}}>

                  {e.mood?<span style={{fontSize:15}}>{MOOD_E[e.mood]}</span>:null}
                  {e.energy?<span style={{fontSize:13}}>{eEmj[e.energy]}</span>:null}
                  {isT&&<Tag color="var(--blue)">bugün</Tag>}
                </div>
                {e.morning?.some(x=>x)&&(

                {e.evening&&<div style={{fontSize:12,color:"var(--text3)",fontStyle:"italic"}}>🌙 {e.evening}</div>}
              </div>
            );
          })}
          </div>
        </div>
      )} {/* tab===history END */}
    </div>
  );
}

/* ── BOARD VIEW ── */
function BoardView({board,streak,weekPct,myEff}){
  const [tab,setTab]=useState("disc");
  const maxEff=Math.max(1,...board.map(u=>u.ef||0)),maxDisc=Math.max(1,...board.map(u=>u.disc||0));
  const sorted=[...board].sort((a,b)=>tab==="disc"?b.disc-a.disc:tab==="streak"?b.st-a.st||b.wp-a.wp:tab==="effort"?b.ef-a.ef||b.wp-a.wp:b.wp-a.wp||b.ef-a.ef);
  const myRank=sorted.findIndex(u=>u.me)+1,me=sorted.find(u=>u.me);
  const medals=["var(--gold)","var(--text3)","#c77b3a"];
  const motiv=()=>{
    if(myRank===1)return"👑 Zirvede! Kimse sana yaklaşamıyor.";
    const ab=sorted[myRank-2];
    if(tab==="disc")return`⚡ ${ab.n}'i geçmek için ${(ab.disc||0)-(me?.disc||0)} puan lazım.`;
    if(tab==="streak"){const d=ab.st-streak;return d<=0?`🔥 ${ab.n} ile aynı seride!`:`🔥 ${ab.n}'i geçmek için ${d} gün daha.`}
    if(tab==="effort")return`⏱ ${ab.n}'i geçmek için ${fmtM((ab.ef||0)-myEff)} daha.`;
    const d=ab.wp-weekPct;return d<=0?"📊 Aynı seviyedesin!":`📊 ${ab.n}'i geçmek için %${d} daha.`;
  };
  const TABS=[["disc","⚡ Disiplin"],["streak","🔥 Seri"],["effort","⏱ Efor"],["completion","📊 Bitirme"],["coach","👁 Koç"]];
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {/* My rank hero */}
      <div className="card fade-up" style={{padding:"24px 20px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 0% 50%, var(--blue-dim), transparent 65%)"}}/>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div className="hero" style={{fontSize:56,color:"var(--text)"}}>#{myRank}</div>
            <div style={{fontSize:13,color:"var(--text3)",marginTop:4}}>
              Disiplin <strong style={{color:"var(--blue)"}}>{me?.disc||0}</strong> · {fmtM(myEff)} efor · %{weekPct}
            </div>
          </div>
          {getBadge(streak)&&(
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:44,animation:"breathe 2s infinite"}}>{getBadge(streak).e}</div>
              <div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>{streak} gün</div>
            </div>
          )}
        </div>
      </div>

      {/* Formula */}
      <div style={{background:"var(--blue-dim)",border:"1px solid rgba(79,142,247,.2)",borderRadius:18,padding:"13px 16px",display:"flex",gap:10,alignItems:"center"}}>
        <span>⚡</span>
        <div style={{fontSize:11,color:"var(--text3)",lineHeight:1.6}}>
          <strong style={{color:"var(--blue)"}}>Disiplin = %30 Tamamlama + %30 Efor + %25 Check-in + %15 Seri.</strong> Her pazartesi sıfırlanır. Efor sadece timer'dan gelir.
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,background:"var(--bg3)",border:"1px solid var(--border)",padding:4,borderRadius:18}}>
        {TABS.map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)}
            style={{flex:1,padding:"9px 4px",background:tab===k?"var(--bg5)":"transparent",color:tab===k?"var(--text)":"var(--text3)",fontSize:11,fontWeight:tab===k?700:400,borderRadius:14,border:"none",cursor:"pointer",transition:"all .15s",whiteSpace:"nowrap",fontFamily:"inherit"}}>
            {l}
          </button>
        ))}
      </div>

      {/* List */}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {sorted.map((u,i)=>{
          const rank=i+1,isTop=rank<=3,isMe=u.me,badge=getBadge(u.st);
          let mv,ml,mc,bp;
          if(tab==="disc"){mv=u.disc||0;ml="disiplin";mc="var(--blue)";bp=Math.round((u.disc||0)/maxDisc*100)}
          else if(tab==="streak"){mv=`${u.st}g`;ml="seri";mc="var(--orange)";bp=Math.round(u.st/Math.max(1,sorted[0].st)*100)}
          else if(tab==="effort"){mv=fmtM(u.ef||0);ml="efor";mc="var(--green)";bp=Math.round((u.ef||0)/maxEff*100)}

/* YZ API çağrısı */
async function callAI(systemPrompt, userPrompt) {
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: userPrompt }],
      }),
    });
    const data = await res.json();
    return data.content?.[0]?.text || null;
  } catch { return null; }
}

/* Kullanıcı profili özeti — YZ'ye gönderilecek veri */
function buildUserContext({ tasks, journal, stats, discScore, now, profile }) {
  const td = today();
  const yesterday = new Date(now); yesterday.setDate(now.getDate()-1);
  const yStr = ds(yesterday);
  const yTasks = tasks.filter(x => x.date === yStr);
  const yDone = yTasks.filter(x => x.done);
  const tdTasks = tasks.filter(x => x.date === td);

  // Son 7 günün performansı
  const last7 = Array.from({length:7},(_,i)=>{
    const d = new Date(now); d.setDate(now.getDate()-i);
    const dstr = ds(d), dt = tasks.filter(x=>x.date===dstr);
    const done = dt.filter(x=>x.done).length;
    return { date: dstr, total: dt.length, done, pct: dt.length ? Math.round(done/dt.length*100) : 0 };
  }).reverse();

  // En sık tamamlanan kategoriler
  const catCounts = {};
  tasks.filter(x=>x.done).forEach(t => { catCounts[t.cat] = (catCounts[t.cat]||0)+1; });
  const topCats = Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>CAT[k]?.label||k);

  // Mood trendi
  const recentMoods = Array.from({length:7},(_,i)=>{
    const d = new Date(now); d.setDate(now.getDate()-i);
    return journal[ds(d)]?.mood || 0;
  }).filter(m=>m>0);
  const avgMood = recentMoods.length ? Math.round(recentMoods.reduce((s,m)=>s+m,0)/recentMoods.length) : 0;

  // Hangi saat diliminde aktif
  const hourBuckets = {sabah:0, oglen:0, aksam:0, gece:0};
  tasks.filter(x=>x.done&&x.time).forEach(x=>{
    const h = parseInt(x.time.split(":")[0]);
    if(h>=6&&h<12) hourBuckets.sabah++;
    else if(h>=12&&h<17) hourBuckets.oglen++;
    else if(h>=17&&h<22) hourBuckets.aksam++;
    else hourBuckets.gece++;
  });
  const bestHour = Object.entries(hourBuckets).sort((a,b)=>b[1]-a[1])[0]?.[0] || "sabah";

  const gunler = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];

  return `
Kullanıcı: ${profile.name}
Bugün: ${gunler[now.getDay()]}, ${now.getDate()} ${MONS[now.getMonth()]} ${now.getFullYear()} - Saat: ${now.getHours()}:${p2(now.getMinutes())}

GENEL İSTATİSTİKLER:
- Streak: ${stats.streak} gün
- Disiplin skoru: ${discScore}/100
- Toplam tamamlanan görev: ${stats.doneAll}
- Bu hafta tamamlama: %${stats.weekPct}
- Bugün: ${tdTasks.filter(x=>x.done).length}/${tdTasks.length} görev tamamlandı
- En verimli olduğu saat dilimi: ${bestHour}
- En çok çalıştığı kategoriler: ${topCats.join(", ") || "henüz veri yok"}

DÜN:
- ${yDone.length}/${yTasks.length} görev tamamladı
- Tamamlanan görevler: ${yDone.slice(0,5).map(t=>t.title).join(", ") || "yok"}

SON 7 GÜN PERFORMANSI:
${last7.map(d=>`- ${d.date}: ${d.done}/${d.total} görev (%${d.pct})`).join("\n")}

RUH HALİ:
- Son 7 günün ortalama mood'u: ${avgMood ? MOOD_L[avgMood] : "veri yok"}
- Bugünkü günlük: ${journal[td]?.text?.slice(0,200) || "henüz yazmamış"}

BUGÜN KALAN GÖREVLER:
${tdTasks.filter(x=>!x.done).slice(0,5).map(t=>`- ${t.title} (${PRI[t.priority]?.label})`).join("\n") || "Görev yok"}
  `.trim();
}

/* YZ Görev Önerici */
function AITaskSuggestions({ tasks, now, onAdd }) {
  const [suggestions, setSuggestions] = useState([]);
  const [loading, setLoading] = useState(false);
  const [shown, setShown] = useState(false);

  const analyze = async () => {
    setLoading(true); setShown(true);
    // Son 2 haftanın tekrar eden görevlerini bul
    const last14 = Array.from({length:14},(_,i)=>{
      const d = new Date(now); d.setDate(now.getDate()-i-1);
      return tasks.filter(x=>x.date===ds(d)&&x.done);
    }).flat();

    const titleCounts = {};
    last14.forEach(t=>{ titleCounts[t.title]=(titleCounts[t.title]||0)+1; });
    const recurring = Object.entries(titleCounts).filter(([,c])=>c>=2).sort((a,b)=>b[1]-a[1]).slice(0,8);

    const prompt = `
Kullanıcının son 2 haftada tekrar eden tamamlanmış görevleri:
${recurring.map(([t,c])=>`- "${t}" (${c} kez)`).join("\n") || "Henüz yeterli veri yok"}

Bugün tamamlanmamış görevler:
${tasks.filter(x=>x.date===today()&&!x.done).map(t=>t.title).join(", ") || "Yok"}

Saat: ${now.getHours()}:${p2(now.getMinutes())}
Bugün: ${DAYS_L[now.getDay()]}

Kullanıcıya bugün için 3 görev öner. Her öneri için:
- Geçmiş alışkanlıklarına dayandır
- Kısa ve net başlık (max 5 kelime)
- Öncelik: high/med/low
- Kategori: is/kisisel/saglik/egitim/diger

Sadece JSON array dön, başka hiçbir şey yazma:
[{"title":"...","priority":"med","cat":"egitim"},...]
    `.trim();

    const res = await callAI(
      "Sen UP. uygulamasının YZ koçusun. Kullanıcının alışkanlıklarını analiz edip görev öneriyorsun. Sadece JSON döndür.",
      prompt
    );

    try {
      const clean = res?.replace(/```json|```/g,"").trim();
      const parsed = JSON.parse(clean);
      setSuggestions(parsed.slice(0,3));
    } catch { setSuggestions([]); }
    setLoading(false);
  };

  if (!shown) {
    return (
      <button onClick={analyze} style={{
        background:"var(--bg3)", border:".5px solid var(--border)",
        borderRadius:16, padding:"13px 16px",
        display:"flex", alignItems:"center", gap:12,
        cursor:"pointer", width:"100%", textAlign:"left",
        WebkitTapHighlightColor:"transparent",
        transition:"opacity .15s",
      }}>
        <div style={{ fontSize:20 }}>🤖</div>
        <div>
          <div style={{ fontSize:14, fontWeight:600, color:"var(--text)", letterSpacing:"-.01em" }}>YZ Görev Önerisi</div>
          <div style={{ fontSize:12, color:"var(--text3)", marginTop:2 }}>Alışkanlıklarına göre bugün ne yapmalısın?</div>
        </div>
        <div style={{ marginLeft:"auto", fontSize:12, color:"var(--blue)", fontWeight:600 }}>Analiz Et →</div>
      </button>
    );
  }

  return (
    <div style={{
      background:"var(--bg3)", border:".5px solid var(--border)",
      borderRadius:18, padding:"16px",
    }}>
      <div style={{ fontSize:11, fontWeight:700, letterSpacing:".08em", textTransform:"uppercase", color:"var(--blue)", marginBottom:12 }}>
        🤖 YZ ÖNERİLERİ
      </div>
      {loading ? (
        <div style={{ display:"flex", gap:8, alignItems:"center", padding:"8px 0" }}>
          {[0,1,2].map(i=>(
            <div key={i} style={{ width:8, height:8, borderRadius:"50%", background:"var(--text3)", animation:`breathe 1.2s ${i*.2}s infinite ease` }}/>
          ))}
          <span style={{ fontSize:13, color:"var(--text3)" }}>Alışkanlıkların analiz ediliyor...</span>
        </div>
      ) : suggestions.length === 0 ? (
        <div style={{ fontSize:13, color:"var(--text3)", padding:"8px 0" }}>Henüz yeterli veri yok. Birkaç gün daha kullan.</div>
      ) : (
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {suggestions.map((s,i)=>{
            const pri = PRI[s.priority] || PRI.med;
            const cat = CAT[s.cat] || CAT.diger;
            return (
              <div key={i} style={{
                display:"flex", alignItems:"center", gap:12,
                background:"var(--bg4)", borderRadius:14, padding:"12px 14px",
                border:`.5px solid var(--border)`,
              }}>
                <div style={{ width:4, height:36, background:pri.dot, borderRadius:2, flexShrink:0 }}/>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:14, fontWeight:500, color:"var(--text)", letterSpacing:"-.01em" }}>{s.title}</div>
                  <div style={{ display:"flex", gap:6, marginTop:4 }}>
                    <span style={{ fontSize:11, color:pri.dot, fontWeight:600 }}>{pri.label}</span>
                    <span style={{ fontSize:11, color:cat.color }}>{cat.label}</span>
                  </div>
                </div>
                <button onClick={()=>{ onAdd(s.title,s.priority,s.cat,60); }}
                  style={{
                    background:"var(--text)", border:"none", borderRadius:10,
                    padding:"7px 14px", color:"var(--bg)", fontSize:13,
                    fontWeight:700, cursor:"pointer", flexShrink:0,
                    letterSpacing:"-.01em",
                  }}>
                  + Ekle
                </button>
              </div>
            );
          })}
          <button onClick={()=>setShown(false)} style={{
            background:"none", border:"none", color:"var(--text3)", fontSize:12,
            cursor:"pointer", textAlign:"center", padding:"4px", marginTop:4,
          }}>Kapat</button>
        </div>
      )}
    </div>
  );
}

function App(){
  const [splash,setSplash]=useState(true);
  const [isDark,setIsDark]=useState(()=>ld(SK.theme,"dark")!=="light");
  const [prevView,setPrevView]=useState("day");
  const [tasks,setTasks]=useState(()=>ld(SK.tasks,[]));
  const [journal,setJournal]=useState(()=>ld(SK.jrnl,{}));
  const [profile,setProfile]=useState(()=>ld(SK.prof,{name:"Sen",avatar:"🧑"}));
  const [board,setBoard]=useState(()=>ld(SK.brd,defBoard()));
  const [ci,setCi]=useState(()=>ld(SK.ci,{}));
  const [archive,setArchive]=useState(()=>ld(SK.arc,{}));
  const [view,setView]=useState("day");
  const changeView=React.useCallback((v)=>{setPrevView(view);setView(v)},[view]);
  const [filter,setFilter]=useState({type:"p",value:"all"});
  const [now,setNow]=useState(new Date());
  const [timers,setTimers]=useState([]);
  const tmrIntervalsRef=useRef({});
  const [templates,setTemplates]=useState(()=>ld(SK.tpls,DEFAULT_TEMPLATES));
  const [recurring,setRecurring]=useState(()=>ld(SK.recur,[]));
  const [showAdd,setShowAdd]=useState(false);
  const [showProf,setShowProf]=useState(false);
  const [showFilter,setShowFilter]=useState(false);
  const [showTpl,setShowTpl]=useState(false);
  const tmRef=useRef(null);

  /* ── YZ STATE ── */
  const [aiMorning,setAiMorning]=useState(null);
  const [aiMorningLoading,setAiMorningLoading]=useState(false);
  const [aiMorningDismissed,setAiMorningDismissed]=useState(false);
  const [aiEvening,setAiEvening]=useState(null);
  const [aiEveningLoading,setAiEveningLoading]=useState(false);
  const [aiStreakMsg,setAiStreakMsg]=useState(null);
  const [aiWeekly,setAiWeekly]=useState(null);
  const [aiWeeklyLoading,setAiWeeklyLoading]=useState(false);
  const [aiWeeklyDismissed,setAiWeeklyDismissed]=useState(false);
  const [showAiPanel,setShowAiPanel]=useState(false);
  const aiDayKey=useRef("");

  /* Theme */
  useEffect(()=>{
    document.documentElement.setAttribute("data-theme",isDark?"dark":"light");
    sv(SK.theme,isDark?"dark":"light");
  },[isDark]);

  /* Persist */
  useEffect(()=>sv(SK.tasks,tasks),[tasks]);
  useEffect(()=>sv(SK.jrnl,journal),[journal]);
  useEffect(()=>sv(SK.prof,profile),[profile]);
  useEffect(()=>sv(SK.brd,board),[board]);
  useEffect(()=>sv(SK.ci,ci),[ci]);
  useEffect(()=>sv(SK.tpls,templates),[templates]);
  useEffect(()=>sv(SK.recur,recurring),[recurring]);

  /* Clock */
  useEffect(()=>{const id=setInterval(()=>setNow(new Date()),30000);return()=>clearInterval(id)},[]);

  /* Tekrarlayan görevler */
  useEffect(()=>{
    if(!recurring.length)return;
    const td=today();
    const dayIdx=(new Date().getDay()+6)%7;
    recurring.forEach(r=>{
      const activeToday=r.days==="daily"||(Array.isArray(r.days)&&r.days.includes(dayIdx));
      if(!activeToday)return;
      const alreadyAdded=tasks.some(t=>t.date===td&&t.recurId===r.id);
      if(alreadyAdded)return;
      setTasks(p=>[...p,{
        id:Date.now()+Math.random(),
        title:r.title,priority:r.pri,cat:r.cat,
        dur:r.dur||0,noTimer:r.noTimer||false,
        done:false,date:td,
        time:r.time||"",eff:0,
        subtasks:(r.subtasks||[]).map(s=>({...s,done:false})),
        recurId:r.id,auto:true,
      }]);
    });
  },[today(),recurring.length]);

  /* Multi-timer */
  useEffect(()=>{
    Object.values(tmrIntervalsRef.current).forEach(clearInterval);
    tmrIntervalsRef.current={};
    timers.forEach(tm=>{
      if(tm.running){
        tmrIntervalsRef.current[tm.id]=setInterval(()=>{
          setTimers(prev=>prev.map(t=>t.id===tm.id?{...t,elapsed:t.elapsed+1}:t));
        },1000);
      }
    });
    return()=>Object.values(tmrIntervalsRef.current).forEach(clearInterval);
  },[timers.map(t=>t.id+t.running).join(',')]);

  /* Archive */
  useEffect(()=>{
    if(!tasks.length)return;
    const thisMonday=ds(getMon(now));
    if(archive[thisMonday])return;
    const lastNow=new Date(getMon(now));lastNow.setDate(lastNow.getDate()-1);
    const st=calcStreak({tasks,ci});
    const score=calcDisc({tasks,ci,streak:st,now:lastNow});
    const lastMon=(()=>{const m=new Date(getMon(now));m.setDate(m.getDate()-7);return ds(m)})();
    const u={...archive,[lastMon]:{score}};setArchive(u);sv(SK.arc,u);
  },[now.toDateString()]);

  /* Stats */
  const stats=useMemo(()=>{
    const td=today(),tdT=tasks.filter(x=>x.date===td),total=tdT.length,done=tdT.filter(x=>x.done).length;
    const pct=total===0?0:Math.round(done/total*100);
    const effToday=Math.round(tdT.filter(x=>x.done&&x.eff).reduce((s,x)=>s+x.eff/60,0));
    const dow=(now.getDay()+6)%7;let wT=0,wD=0,effWeek=0;
    for(let i=0;i<=dow;i++){const d=new Date(now);d.setDate(now.getDate()-i);const x=tasks.filter(t=>t.date===ds(d));wT+=x.length;wD+=x.filter(t=>t.done).length;effWeek+=Math.round(x.filter(t=>t.done&&t.eff).reduce((s,t)=>s+t.eff/60,0));}
    const weekPct=wT===0?0:Math.round(wD/wT*100);
    const y=now.getFullYear(),m=now.getMonth(),dim=new Date(y,m+1,0).getDate();
    let mT=0,mD=0;for(let d=1;d<=dim;d++){const dstr=`${y}-${p2(m+1)}-${p2(d)}`;const x=tasks.filter(t=>t.date===dstr);mT+=x.length;mD+=x.filter(t=>t.done).length;}
    const monthPct=mT===0?0:Math.round(mD/mT*100);
    const streak=calcStreak({tasks,ci});
    const counts={all:tdT.length};
    Object.keys(PRI).forEach(p=>counts[p]=tdT.filter(x=>x.priority===p).length);
    Object.keys(CAT).forEach(c=>counts[c]=tdT.filter(x=>x.cat===c).length);
    return{pct,doneT:done,totalT:total,doneAll:tasks.filter(x=>x.done).length,totalAll:tasks.length,weekPct,monthPct,streak,counts,effToday,effWeek};
  },[tasks,ci,now]);

  const discScore=useMemo(()=>calcDisc({tasks,ci,streak:stats.streak,now}),[tasks,ci,stats.streak,now]);
  const penaltyActive=useMemo(()=>calcPenalty({tasks,ci,now}),[tasks,ci,now]);

  /* ── YZ: Sabah koçu — günde 1 kez ── */
  useEffect(()=>{
    const dayKey=ds(now);
    if(aiDayKey.current===dayKey)return;
    if(aiMorning||aiMorningLoading)return;
    // Sadece sabah 5-12 arası göster
    const h=now.getHours();
    if(h<5||h>18)return;
    aiDayKey.current=dayKey;
    setAiMorningLoading(true);
    setAiMorningDismissed(false);

    const ctx=buildUserContext({tasks,journal,stats,discScore,now,profile});
    const sysPrompt=`Sen UP. uygulamasının kişisel YZ koçusun. Kısa, samimi, motive edici Türkçe mesajlar yazıyorsun. Hiçbir zaman jenerik olmuyorsun — her mesaj kullanıcının gerçek verisine dayanıyor. Maksimum 2-3 cümle.`;
    const userPrompt=`${ctx}\n\nKullanıcıya bugün için kısa, kişisel bir sabah mesajı yaz. Verilerini kullan — genel motivasyon yazma. Sanki onu gerçekten tanıyan biri gibi konuş.`;

    callAI(sysPrompt,userPrompt).then(msg=>{
      setAiMorning(msg);
      setAiMorningLoading(false);
    });
  },[now.toDateString(),tasks.length]);

  /* ── YZ: Streak tehlikede ── */
  useEffect(()=>{
    if(stats.streak<3)return;
    const td=today();
    const hasDone=tasks.some(x=>x.date===td&&x.done);
    const hasCI=ci[td];
    if(hasDone||hasCI){setAiStreakMsg(null);return;}
    const h=now.getHours();
    if(h<18)return; // Sadece akşam göster
    if(aiStreakMsg)return;

    const ctx=buildUserContext({tasks,journal,stats,discScore,now,profile});
    const sysPrompt=`Sen UP. uygulamasının YZ koçusun. Kullanıcının streaki tehlikede. Kısa, acil ama yargılamayan Türkçe mesaj. 1-2 cümle max.`;
    callAI(sysPrompt,`${ctx}\n\nKullanıcının ${stats.streak} günlük serisi bu gece kırılacak. Onu harekete geçirecek kısa bir uyarı yaz.`)
      .then(msg=>setAiStreakMsg(msg));
  },[now.getHours(),stats.streak,tasks.length]);

  /* ── YZ: Haftalık rapor — Pazar akşamı ── */
  useEffect(()=>{
    if(now.getDay()!==0)return;
    if(now.getHours()<17)return;
    if(aiWeekly||aiWeeklyLoading||aiWeeklyDismissed)return;
    setAiWeeklyLoading(true);

    const ctx=buildUserContext({tasks,journal,stats,discScore,now,profile});
    const sysPrompt=`Sen UP. uygulamasının YZ koçusun. Haftalık özet yazıyorsun. Samimi, içgörülü, 3-4 cümle. Türkçe.`;
    callAI(sysPrompt,`${ctx}\n\nBu haftanın kısa özetini yaz. Ne iyi gitti, ne geliştirilebilir, önümüzdeki hafta için 1 odak noktası öner.`)
      .then(msg=>{setAiWeekly(msg);setAiWeeklyLoading(false);});
  },[now.getDay(),now.getHours()]);

  /* Sync board */
  useEffect(()=>{
    setBoard(prev=>{const others=prev.filter(u=>!u.me);return[...others,{id:"me",n:profile.name,av:profile.avatar,st:stats.streak,wp:stats.weekPct,ef:stats.effWeek,disc:discScore,me:true}]});
  },[stats.streak,stats.weekPct,stats.effWeek,discScore,profile.name,profile.avatar]);

  /* Actions */
  const addTask=useCallback((title,pri,cat,dur,timeBlock,subtasks)=>{
    if(!title.trim())return;
    setTasks(p=>[...p,{
      id:Date.now()+Math.random(),
      title:title.trim(),priority:pri,cat,
      dur:dur||0,done:false,date:today(),
      time:timeBlock||new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"}),
      eff:0,subtasks:subtasks||[],noTimer:dur===-1,
    }]);
  },[]);
  const addFromTemplate=useCallback((tpl)=>{
    setTasks(p=>[...p,{
      id:Date.now()+Math.random(),
      title:tpl.name.replace(/[^\w\sÀ-ž]/g,'').trim()||tpl.name,
      priority:tpl.pri,cat:tpl.cat,dur:tpl.dur||0,done:false,date:today(),
      time:new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"}),
      eff:0,subtasks:(tpl.subtasks||[]).map(s=>({...s,done:false})),
      noTimer:tpl.noTimer||tpl.dur===-1,fromTemplate:tpl.id,
    }]);
  },[]);
  const toggleTask=useCallback(id=>{if(timers.find(t=>t.id===id))return;setTasks(p=>p.map(x=>x.id===id?{...x,done:!x.done}:x))},[timers]);
  const toggleSubtask=useCallback((taskId,subIdx)=>{
    setTasks(p=>p.map(x=>{
      if(x.id!==taskId)return x;
      const subs=(x.subtasks||[]).map((s,i)=>i===subIdx?{...s,done:!s.done}:s);
      const allDone=subs.length>0&&subs.every(s=>s.done);
      return{...x,subtasks:subs,done:allDone?true:x.done};
    }));
  },[]);
  const deleteTask=useCallback(id=>{if(timers.find(t=>t.id===id))return;setTasks(p=>p.filter(x=>x.id!==id))},[timers]);
  const doCI=useCallback(()=>{const td=today();setCi(prev=>{const u={...prev,[td]:true};sv(SK.ci,u);return u})},[]);
  const startTimer=useCallback(task=>{
    if(timers.length>=3)return;
    if(timers.find(t=>t.id===task.id))return;
    setTimers(prev=>[...prev,{id:task.id,title:task.title,dur:task.dur||0,running:true,elapsed:0}]);
  },[timers]);
  const pauseTimer=useCallback(taskId=>{setTimers(prev=>prev.map(t=>t.id===taskId?{...t,running:false}:t))},[]);
  const resumeTimer=useCallback(taskId=>{setTimers(prev=>prev.map(t=>t.id===taskId?{...t,running:true}:t))},[]);
  const stopTimer=useCallback(taskId=>{
    const tm=timers.find(t=>t.id===taskId);
    if(!tm)return;
    if(tm.elapsed>0){setTasks(p=>p.map(x=>x.id===taskId?{...x,done:true,eff:tm.elapsed}:x));}
    clearInterval(tmrIntervalsRef.current[taskId]);
    delete tmrIntervalsRef.current[taskId];
    setTimers(prev=>prev.filter(t=>t.id!==taskId));
  },[timers]);

  const timer=timers.length>0?timers[0]:null;
  const elapsed=timer?.elapsed||0;
  const navH=62+20;
  const timerH=timers.length>0?Math.min(timers.length,3)*60:0;
  const contentPb=navH+timerH+16;

  /* YZ Panel Sheet */
  const AIPanel=()=>(
    <>
      <div className="overlay" onClick={()=>setShowAiPanel(false)}/>
      <div className="sheet">
        <div className="sheet-drag"/>
        <div style={{padding:"20px 20px 0"}}>
          <div style={{
            fontFamily:"'New York',Georgia,serif",
            fontSize:24,fontWeight:700,color:"var(--text)",
            letterSpacing:"-.03em",marginBottom:6,
          }}>YZ Koçun</div>
          <div style={{fontSize:13,color:"var(--text3)",marginBottom:20}}>Verilerine dayalı kişisel analizin</div>

          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {/* Sabah mesajı */}
            {aiMorning&&(
              <AICoachCard message={aiMorning} type="morning"
                onRefresh={()=>{setAiMorning(null);setAiMorningLoading(true);const ctx=buildUserContext({tasks,journal,stats,discScore,now,profile});callAI("Sen UP. uygulamasının kişisel YZ koçusun. Kısa, samimi, motive edici Türkçe mesajlar yazıyorsun. Maksimum 2-3 cümle.",`${ctx}\n\nYeni bir sabah mesajı yaz.`).then(m=>{setAiMorning(m);setAiMorningLoading(false);});}}
                onDismiss={()=>{setAiMorning(null);setAiMorningDismissed(true);}}
                loading={aiMorningLoading}/>
            )}

            {/* Streak tehlikesi */}
            {aiStreakMsg&&(
              <AICoachCard message={aiStreakMsg} type="streak"
                onRefresh={()=>setAiStreakMsg(null)}
                onDismiss={()=>setAiStreakMsg(null)}
                loading={false}/>
            )}

            {/* Haftalık rapor */}
            {(aiWeekly||aiWeeklyLoading)&&!aiWeeklyDismissed&&(
              <AICoachCard message={aiWeekly} type="weekly"
                onRefresh={()=>{setAiWeekly(null);setAiWeeklyLoading(true);const ctx=buildUserContext({tasks,journal,stats,discScore,now,profile});callAI("Sen UP. uygulamasının YZ koçusun. Haftalık özet yazıyorsun. 3-4 cümle Türkçe.",`${ctx}\n\nHaftalık özet yaz.`).then(m=>{setAiWeekly(m);setAiWeeklyLoading(false);});}}
                onDismiss={()=>{setAiWeekly(null);setAiWeeklyDismissed(true);}}
                loading={aiWeeklyLoading}/>
            )}

            {/* Anlık analiz butonu */}
            <button onClick={async()=>{
              const ctx=buildUserContext({tasks,journal,stats,discScore,now,profile});
              const msg=await callAI(
                "Sen UP. uygulamasının YZ koçusun. Kullanıcının verisini derinlemesine analiz et. 4-5 cümle, içgörülü, Türkçe.",
                `${ctx}\n\nKullanıcının güçlü ve zayıf yönlerini analiz et. Spesifik bir gelişim önerisi ver.`
              );
              if(msg)setAiMorning(msg);
            }} style={{
              background:"var(--blue)",border:"none",borderRadius:16,
              padding:"15px",color:"#fff",fontSize:15,fontWeight:700,
              cursor:"pointer",letterSpacing:"-.01em",width:"100%",
              transition:"opacity .15s",
            }}>
              🔍 Şu An Analiz Et
            </button>

            <AITaskSuggestions tasks={tasks} now={now} onAdd={(t,p,c,d)=>{addTask(t,p,c,d);setShowAiPanel(false);}}/>
          </div>
          <div style={{height:8}}/>
        </div>
      </div>
    </>
  );

  return(
    <div style={{background:"var(--bg)",color:"var(--text)",minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      {splash&&<SplashScreen onDone={()=>setSplash(false)}/>}
      {showAiPanel&&<AIPanel/>}
      {showAdd    &&<AddSheet    onClose={()=>setShowAdd(false)}    add={addTask}/>}
      {showTpl    &&<TemplateSheet onClose={()=>setShowTpl(false)} templates={templates} onUseTemplate={addFromTemplate} recurring={recurring} setRecurring={setRecurring}/>}
      {showProf   &&<ProfileSheet profile={profile} setProfile={setProfile} onClose={()=>setShowProf(false)}/>}
      {showFilter &&<FilterSheet filter={filter} setFilter={setFilter} stats={stats} onClose={()=>setShowFilter(false)}/>}

      <Header view={view} profile={profile} stats={stats} discScore={discScore}
        timer={timer} elapsed={elapsed} onPause={pauseTimer} onResume={resumeTimer} onStop={stopTimer}
        onProfile={()=>setShowProf(true)} onFilter={()=>setShowFilter(true)} onAdd={()=>setShowAdd(true)} onTpl={()=>setShowTpl(true)}
        isDark={isDark} toggleTheme={()=>setIsDark(d=>!d)}
        onAI={()=>setShowAiPanel(true)}
        hasAI={!!(aiMorning||aiStreakMsg||aiWeekly)}/>

      {timers.length>0&&<TimerFloat timers={timers} onPause={pauseTimer} onResume={resumeTimer} onStop={stopTimer}/>}

      {/* YZ sabah kartı — day view'da inline göster */}
      {view==="day"&&!aiMorningDismissed&&(aiMorning||aiMorningLoading)&&(
        <div style={{margin:"0 var(--pad) 10px"}}>
          <AICoachCard
            message={aiMorning} type="morning" loading={aiMorningLoading}
            onRefresh={()=>{setAiMorning(null);setAiMorningLoading(true);const ctx=buildUserContext({tasks,journal,stats,discScore,now,profile});callAI("Sen UP. uygulamasının kişisel YZ koçusun. Kısa, samimi, motive edici Türkçe. Max 2-3 cümle.",`${ctx}\n\nSabah mesajı yaz.`).then(m=>{setAiMorning(m);setAiMorningLoading(false);});}}
            onDismiss={()=>{setAiMorning(null);setAiMorningDismissed(true);}}/>
        </div>
      )}

      {/* Streak tehlike uyarısı */}
      {view==="day"&&aiStreakMsg&&(
        <div style={{margin:"0 var(--pad) 10px"}}>
          <AICoachCard message={aiStreakMsg} type="streak" loading={false}
            onRefresh={()=>setAiStreakMsg(null)}
            onDismiss={()=>setAiStreakMsg(null)}/>
        </div>
      )}

      {/* Motivasyon şeridi — YZ yokken */}
      {view==="day"&&stats.totalT>0&&!aiMorning&&!aiMorningLoading&&(
        <div style={{margin:"0 var(--pad) 10px",padding:"13px 16px",background:"var(--accent-bg)",border:".5px solid var(--border)",borderRadius:16,fontSize:14,color:"var(--text2)",fontStyle:"italic",letterSpacing:"-.01em",lineHeight:1.55}}>
          {motivMsg(stats.pct,stats.streak)}
        </div>
      )}

      <div key={view} className="scroll-content fade-up" style={{flex:1,padding:`0 var(--pad) ${contentPb}px`,overflow:"auto",WebkitOverflowScrolling:"touch"}}>
        {view==="day"    &&<div key="day" className="view-in" style={{minHeight:"100%"}}>
          <DayView tasks={tasks} filter={filter} toggle={toggleTask} del={deleteTask} timers={timers} startTimer={startTimer} toggleSubtask={toggleSubtask} ci={ci} onCI={doCI} stats={stats} streak={stats.streak} archive={archive} discScore={discScore} now={now}/>
          {/* AI görev önerisi — görev listesinin altında */}
          <div style={{marginTop:12}}>
            <AITaskSuggestions tasks={tasks} now={now} onAdd={addTask}/>
          </div>
        </div>}
        {view==="week"   &&<WeekView    tasks={tasks} now={now} journal={journal} ci={ci} discScore={discScore}/>}
        {view==="month"  &&<MonthView   tasks={tasks} now={now} ci={ci} journal={journal} discScore={discScore}/>}
        {view==="disc"   &&<DiscView    tasks={tasks} ci={ci} now={now} archive={archive} streak={stats.streak} discScore={discScore} penaltyActive={penaltyActive}/>}
        {view==="stats"  &&<StatsView   tasks={tasks} now={now} discScore={discScore} stats={stats}/>}
        {view==="journal"&&<JournalView now={now} journal={journal} setJournal={setJournal}/>}
        {view==="journey"&&<JourneyView tasks={tasks} now={now} journal={journal} discScore={discScore} stats={stats}/>}
        {view==="board"  &&<BoardView   board={board} streak={stats.streak} weekPct={stats.weekPct} myEff={stats.effWeek}/>}
      </div>

      {/* Bottom nav — gerçek veriler */}
      <nav className="nav">
        {(()=>{
          const td=today();
          const mon=getMon(now);
          const monEnd=new Date(mon);monEnd.setDate(mon.getDate()+6);
          const todayMood=journal[td]?.mood;
          const sorted=[...board].sort((a,b)=>b.disc-a.disc);
          const myRank=sorted.findIndex(u=>u.me)+1;
          const startD=(()=>{const k="up_start_v2";let d=localStorage.getItem(k);if(!d){d=new Date().toISOString();localStorage.setItem(k,d);}return new Date(d);})();
          const rem=Math.max(0,startD.getTime()+90*86400*1000-now.getTime());
          const remDays=Math.floor(rem/86400000);
          const remH=Math.floor((rem%86400000)/3600000);
          const remMin=Math.floor((rem%3600000)/60000);
          const remSec=Math.floor((rem%60000)/1000);
          const journeyVal=rem===0?"✓":remDays>0?`${remDays}g`:remH>0?`${remH}s`:remMin>0?`${remMin}dk`:`${remSec}sn`;
          const navItems=[
            {id:"day",    val:now.getDate().toString(),              label:"Bugün"},
            {id:"week",   val:`${mon.getDate()}-${monEnd.getDate()}`,label:"Hafta"},
            {id:"month",  val:MONS[now.getMonth()].slice(0,3),       label:"Ay"},
            {id:"disc",   val:discScore>0?`${discScore}`:"—",        label:"Disiplin"},
            {id:"stats",  val:stats.pct>0?`${stats.pct}%`:"—",      label:"Analiz"},
            {id:"journal",val:todayMood?MOOD_E[todayMood]:"?",       label:"Günlük"},
            {id:"board",  val:myRank>0?`${myRank}.`:"—",             label:"Sıralama"},
            {id:"journey",val:journeyVal,                             label:"Yolculuk"},
          ];
          return navItems.map(v=>(
            <button key={v.id} className={`nav-btn ${view===v.id?"on":""}`} onClick={()=>changeView(v.id)}>
              <span className="nav-val">{v.val}</span>
              <span className="nav-lb">{v.label}</span>
            </button>
          ));
        })()}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);








</script>
</body>
</html>
